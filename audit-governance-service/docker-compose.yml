services:
  audit-postgres:
    image: pgvector/pgvector:pg16
    container_name: audit-governance-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit_governance
    ports:
      - "5436:5432"
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot schema migrator. init.sql is applied via /docker-entrypoint-initdb.d
  # ONLY on first volume init, and db/migrations/ was never applied at all — so
  # columns like audit_events.risk_level (m63) were missing and the Audit search
  # 500'd. This runs every `up`, applying all migrations idempotently
  # (ADD COLUMN/CREATE INDEX IF NOT EXISTS), so fresh AND existing volumes stay
  # current. The app waits for it via service_completed_successfully.
  audit-migrate:
    image: pgvector/pgvector:pg16
    container_name: audit-governance-migrate
    depends_on:
      audit-postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: audit
    volumes:
      - ./db:/db:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for m in $$(ls /db/migrations/*.sql 2>/dev/null | sort); do
          echo "applying migration $$m"
          psql -h audit-postgres -U postgres -d audit_governance -v ON_ERROR_STOP=1 -f "$$m"
        done
        echo "audit_governance migrations up to date."
    restart: "no"

  audit-governance:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: audit-governance-service
    ports:
      - "8500:8500"
    environment:
      NODE_ENV: development
      PORT: 8500
      DATABASE_URL: postgresql://postgres:audit@audit-postgres:5432/audit_governance
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      # M74 Phase 2A — llm_judge evaluator posts to llm-gateway's
      # /v1/chat/completions endpoint. Points at the platform's gateway
      # which lives in the main compose; this container reaches it via
      # host.docker.internal:8001 since audit-gov is in its own compose.
      LLM_GATEWAY_URL: ${LLM_GATEWAY_URL:-http://host.docker.internal:8001}
      # Operator log lake. Filesystem is the default for local/dev and writes
      # raw NDJSON to the mounted audit_log_data volume. Set
      # LOG_STORAGE_BACKEND=s3 plus the LOG_S3_* variables to write batches to
      # an S3-compatible bucket instead.
      LOG_STORAGE_BACKEND: ${LOG_STORAGE_BACKEND:-filesystem}
      LOG_STORAGE_PATH: ${LOG_STORAGE_PATH:-/data/singularity-logs}
      LOG_INGEST_MAX_BATCH: ${LOG_INGEST_MAX_BATCH:-500}
      LOG_INGEST_MAX_BODY_BYTES: ${LOG_INGEST_MAX_BODY_BYTES:-5242880}
      LOG_PAYLOAD_MAX_BYTES: ${LOG_PAYLOAD_MAX_BYTES:-131072}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      LOG_RETENTION_DELETE_BATCH: ${LOG_RETENTION_DELETE_BATCH:-10000}
      LOG_RETENTION_SWEEP_SEC: ${LOG_RETENTION_SWEEP_SEC:-3600}
      LOG_EXPORT_TARGETS_JSON: ${LOG_EXPORT_TARGETS_JSON:-[]}
      LOG_EXPORT_MAX_ATTEMPTS: ${LOG_EXPORT_MAX_ATTEMPTS:-8}
      LOG_EXPORT_TIMEOUT_MS: ${LOG_EXPORT_TIMEOUT_MS:-10000}
      LOG_EXPORT_WORKER_SEC: ${LOG_EXPORT_WORKER_SEC:-15}
      LOG_EXPORT_ALLOW_INSECURE_HTTP: ${LOG_EXPORT_ALLOW_INSECURE_HTTP:-false}
      LOG_EXPORT_ALLOW_PRIVATE_URLS: ${LOG_EXPORT_ALLOW_PRIVATE_URLS:-false}
      LOG_ALERT_EVAL_SEC: ${LOG_ALERT_EVAL_SEC:-60}
      LOG_DEFAULT_SLO_ENABLED: ${LOG_DEFAULT_SLO_ENABLED:-true}
      LOG_DEFAULT_SLO_WINDOW_MINUTES: ${LOG_DEFAULT_SLO_WINDOW_MINUTES:-15}
      LOG_DEFAULT_SLO_MINIMUM_EVENTS: ${LOG_DEFAULT_SLO_MINIMUM_EVENTS:-20}
      LOG_DEFAULT_SLO_ERROR_RATE: ${LOG_DEFAULT_SLO_ERROR_RATE:-0.05}
      LOG_S3_ENDPOINT: ${LOG_S3_ENDPOINT:-}
      LOG_S3_BUCKET: ${LOG_S3_BUCKET:-}
      LOG_S3_REGION: ${LOG_S3_REGION:-us-east-1}
      LOG_S3_ACCESS_KEY: ${LOG_S3_ACCESS_KEY:-}
      LOG_S3_SECRET_KEY: ${LOG_S3_SECRET_KEY:-}
      LOG_S3_PREFIX: ${LOG_S3_PREFIX:-singularity-logs}
      # Optional override: model alias used for judge calls. When unset,
      # the gateway picks its configured default. Recommend a cheaper
      # tier (e.g. haiku-equivalent) since judge calls are 1 per eval
      # and can spike under load.
      JUDGE_MODEL_ALIAS: ${JUDGE_MODEL_ALIAS:-}
      JUDGE_TIMEOUT_MS: ${JUDGE_TIMEOUT_MS:-30000}
    depends_on:
      audit-postgres:
        condition: service_healthy
      audit-migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
      - ./db:/app/db
      - audit_log_data:/data/singularity-logs

volumes:
  audit_postgres_data:
  audit_log_data:
