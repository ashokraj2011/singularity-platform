services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentandtools-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent-service:
    build:
      context: .
      dockerfile: apps/agent-service/Dockerfile
    container_name: agentandtools-agent-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3001
      DATABASE_URL: postgresql://postgres:singularity@postgres:5432/singularity
      IAM_SERVICE_URL: ${IAM_SERVICE_URL:-http://host.docker.internal:8100}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      # M11.a — self-register
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      PUBLIC_BASE_URL:       ${AGENT_SERVICE_PUBLIC_URL:-http://host.docker.internal:3001}
      # M11 follow-up — OpenTelemetry → Jaeger
      OTEL_SERVICE_NAME:           agent-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/agent-service/src:/app/apps/agent-service/src

  agent-runtime:
    build:
      context: .
      dockerfile: apps/agent-runtime/Dockerfile
      target: dev
    container_name: agentandtools-agent-runtime
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3003
      DATABASE_URL: postgresql://postgres:singularity@postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      IAM_SERVICE_URL: ${IAM_SERVICE_URL:-http://host.docker.internal:8100}
      IAM_BASE_URL: ${IAM_BASE_URL:-http://host.docker.internal:8100/api/v1}
      IAM_SERVICE_TOKEN: ${AGENT_RUNTIME_IAM_SERVICE_TOKEN:-}
      IAM_SERVICE_TOKEN_TENANT_IDS: ${IAM_SERVICE_TOKEN_TENANT_IDS:-}
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      LOG_LEVEL: info
      AGENT_RUN_FALLBACK_PROVIDER: stub
      AGENT_RUN_FALLBACK_MODEL: stub-model
      PROVIDER_MANIFEST_SIGNATURE_MODE: ${PROVIDER_MANIFEST_SIGNATURE_MODE:-auto}
      PROVIDER_MANIFEST_TRUSTED_KEYS: ${PROVIDER_MANIFEST_TRUSTED_KEYS:-}
      PROVIDER_MANIFEST_MAX_TTL_SECONDS: ${PROVIDER_MANIFEST_MAX_TTL_SECONDS:-2592000}
      # M11.a — self-register
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      PUBLIC_BASE_URL:       ${AGENT_RUNTIME_PUBLIC_URL:-http://host.docker.internal:3003}
      # M11 follow-up — OpenTelemetry → Jaeger
      OTEL_SERVICE_NAME:           agent-runtime
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      # M22/M23 — central audit & governance ledger
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/agent-runtime/src:/app/apps/agent-runtime/src
      - ./apps/agent-runtime/prisma:/app/apps/agent-runtime/prisma
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prompt-composer:
    build:
      context: .
      dockerfile: apps/prompt-composer/Dockerfile
      target: dev
    container_name: agentandtools-prompt-composer
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3004
      DATABASE_URL: postgresql://postgres:singularity@postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      LOG_LEVEL: info
      TOOL_SERVICE_URL: http://agent-service:3001
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      CONTEXT_FABRIC_URL: ${CONTEXT_FABRIC_URL:-http://host.docker.internal:8000}
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      WORKGRAPH_ARTIFACT_FETCH_URL: ${WORKGRAPH_ARTIFACT_FETCH_URL:-http://host.docker.internal:8080/api/internal/artifacts/fetch}
      WORKGRAPH_ARTIFACT_FETCH_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      # M21 — central audit ledger; composer fires events on every compose call.
      AUDIT_GOV_URL:    ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      # Capsule compile + model catalog lookups route through MCP.
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      CAPSULE_COMPILE_MODE:     ${CAPSULE_COMPILE_MODE:-RAW}
      CAPSULE_COMPILE_MODEL_ALIAS: ${CAPSULE_COMPILE_MODEL_ALIAS:-}
      EMBEDDING_MODEL_ALIAS:       ${EMBEDDING_MODEL_ALIAS:-}
      # M11.a — self-register
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      PUBLIC_BASE_URL:       ${PROMPT_COMPOSER_PUBLIC_URL:-http://host.docker.internal:3004}
    # composer reaches the host-side MCP when run as a standalone stack.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/prompt-composer/src:/app/apps/prompt-composer/src
      - ./apps/prompt-composer/prisma:/app/apps/prompt-composer/prisma

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agentandtools-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AGENT_SERVICE_URL: http://localhost:3001
      NEXT_PUBLIC_TOOL_SERVICE_URL: http://localhost:3001
      NEXT_PUBLIC_AGENT_RUNTIME_URL: http://localhost:3003
      NEXT_PUBLIC_PROMPT_COMPOSER_URL: http://localhost:3004
      NEXT_PUBLIC_EVENT_HORIZON_PROVIDER: ${NEXT_PUBLIC_EVENT_HORIZON_PROVIDER:-}
      NEXT_PUBLIC_EVENT_HORIZON_MODEL: ${NEXT_PUBLIC_EVENT_HORIZON_MODEL:-}
      NEXT_PUBLIC_EVENT_HORIZON_CAPABILITY_ID: ${NEXT_PUBLIC_EVENT_HORIZON_CAPABILITY_ID:-}
      AGENT_SERVICE_URL: http://agent-service:3001
      TOOL_SERVICE_URL: http://agent-service:3001
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://host.docker.internal:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      CONTEXT_FABRIC_URL: ${CONTEXT_FABRIC_URL:-http://host.docker.internal:8000}
      EVENT_HORIZON_PROVIDER: ${EVENT_HORIZON_PROVIDER:-}
      EVENT_HORIZON_MODEL: ${EVENT_HORIZON_MODEL:-}
      IAM_BASE_URL: ${IAM_BASE_URL:-http://host.docker.internal:8100/api/v1}
      # M21 — central audit & governance ledger lives outside this compose stack
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
    depends_on:
      - agent-service
      - agent-runtime
      - prompt-composer

volumes:
  postgres_data:
