server {
  listen 80;
  server_name _;
  absolute_redirect off;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_buffering off;

  location = /healthz {
    default_type application/json;
    return 200 '{"status":"ok","service":"platform-web"}';
  }

  location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Old Workgraph embedded mode used BASE_URL=/workflow/, which made API calls
  # go to /workflow/api/*. Keep those calls JSON instead of redirecting them as
  # legacy page links.
  location ^~ /workflow/api/ {
    proxy_pass http://127.0.0.1:3000/api/workgraph/;
  }

  # Compatibility API aliases. Canonical UI routes are served by Next below.
  location ^~ /workflows/api/ {
    proxy_pass http://127.0.0.1:3000/api/workgraph/;
  }

  location ^~ /workbench/api/ {
    proxy_pass http://127.0.0.1:3000/api/workgraph/;
  }

  location ^~ /workbench/audit-gov/ {
    proxy_pass http://127.0.0.1:3000/api/audit-gov/;
  }

  # Restore Blueprint Workbench's native Workbench Neo SPA inside the single
  # platform-web container. API and audit-gov prefixes above remain proxied
  # through Next so browser auth and server-held service credentials stay
  # centralized.
  location = /workbench {
    root /app;
    try_files /workbench/index.html =404;
  }

  location ^~ /workbench/ {
    root /app;
    try_files $uri $uri/ /workbench/index.html;
  }

  location ^~ /foundry/api/codegen/ {
    proxy_pass http://127.0.0.1:3000/api/codegen/;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
  }
}
