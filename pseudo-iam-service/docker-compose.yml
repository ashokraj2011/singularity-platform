services:
  pseudo-iam:
    build: .
    container_name: pseudo-iam
    environment:
      PORT:                  "8101"
      # Must be 32+ chars to satisfy workgraph-api's Zod validator. Aligning
      # to the same value across pseudo-iam + workgraph-api so the JWT minted
      # here verifies in workgraph's middleware (was causing a /context-picker
      # → /dashboard → 401 → /login → /context-picker loop).
      JWT_SECRET:            ${JWT_SECRET:-dev-secret-change-in-prod-min-32-chars!!}
      # The MCP server pseudo-IAM points capability-mcp-servers lookups at.
      # Defaults to the running mcp-server-demo on the host.
      PSEUDO_MCP_BASE_URL:   ${PSEUDO_MCP_BASE_URL:-http://host.docker.internal:7100}
      PSEUDO_MCP_BEARER:     ${PSEUDO_MCP_BEARER:-demo-bearer-token-must-be-min-16-chars}
      # Optional self-register with the platform registry.
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      PUBLIC_BASE_URL:       ${PSEUDO_IAM_PUBLIC_URL:-http://host.docker.internal:8101}
    ports:
      - "8101:8101"
