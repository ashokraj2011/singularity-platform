name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch so a fast follow-up doesn't
# queue behind the older run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Conservative permissions — read-only is enough; no write/push from CI.
permissions:
  contents: read
  packages: write

jobs:
  # ─── TypeScript services — one job per package so failures localise ─────────
  typecheck-ts:
    name: typecheck ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: mcp-server,           dir: mcp-server,                          mgr: npm }
          - { name: pseudo-iam,           dir: pseudo-iam-service,                  mgr: npm }
          - { name: audit-governance,     dir: audit-governance-service,            mgr: npm }
          - { name: agent-service,        dir: agent-and-tools/apps/agent-service,  mgr: workspace }
          - { name: tool-service,         dir: agent-and-tools/apps/tool-service,   mgr: workspace }
          - { name: agent-runtime,        dir: agent-and-tools/apps/agent-runtime,  mgr: workspace, prisma: true }
          - { name: prompt-composer,      dir: agent-and-tools/apps/prompt-composer, mgr: workspace, prisma: true }
          - { name: agent-and-tools/web,  dir: agent-and-tools/web,                  mgr: workspace }
          - { name: workgraph-api,        dir: workgraph-studio/apps/api,            mgr: pnpm-workspace, prisma: true }
          - { name: workgraph-web,        dir: workgraph-studio/apps/web,            mgr: pnpm-workspace }
          - { name: blueprint-workbench,  dir: workgraph-studio/apps/blueprint-workbench, mgr: pnpm-workspace }
          - { name: portal,               dir: singularity-portal,                   mgr: npm }
          - { name: user-and-capability,  dir: UserAndCapabillity,                   mgr: npm }
          - { name: platform-registry,    dir: platform-registry,                    mgr: npm }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # workspace = the npm workspace root carries the lockfile, so we install
      # from the monorepo root and the workspace child resolves through it.
      - name: install (npm workspace)
        if: matrix.service.mgr == 'workspace'
        working-directory: agent-and-tools
        run: npm ci --ignore-scripts

      - name: install (pnpm workspace)
        if: matrix.service.mgr == 'pnpm-workspace'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: |
            - cwd: workgraph-studio
              args: [--frozen-lockfile, --ignore-scripts]

      - name: install (npm standalone)
        if: matrix.service.mgr == 'npm'
        working-directory: ${{ matrix.service.dir }}
        run: npm ci --ignore-scripts

      # Prisma client generation reads schema.prisma; doesn't need a live DB
      # for `generate`, only for `db push`.
      - name: prisma validate (M28 — schema must parse)
        if: matrix.service.prisma == true
        working-directory: ${{ matrix.service.dir }}
        run: |
          # Validate every schema file in prisma/ (M30: prompt-composer has two)
          for schema in prisma/*.prisma; do
            [ -f "$schema" ] && npx prisma validate --schema="$schema"
          done

      - name: prisma generate
        if: matrix.service.prisma == true
        working-directory: ${{ matrix.service.dir }}
        run: |
          # Generate clients for every schema file (M30: prompt-composer has two)
          for schema in prisma/*.prisma; do
            [ -f "$schema" ] && npx prisma generate --schema="$schema"
          done

      - name: typecheck
        working-directory: ${{ matrix.service.dir }}
        # Prefer the workspace's own `lint` script when it exists (some
        # services map it to `tsc --noEmit`); fall back to a direct tsc.
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm run lint --if-present
          else
            npx tsc --noEmit
          fi

  # ─── Python service (context-fabric) ────────────────────────────────────────
  python-syntax:
    name: python syntax (context-fabric)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: compile all .py
        working-directory: context-fabric/services
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            python3 -m py_compile "$f" || fail=1
          done < <(find . -name "*.py" -not -path "*/.venv/*")
          exit $fail

  context-governance-contract:
    name: context plan + governance contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install context-fabric test deps
        run: python3 -m pip install -r context-fabric/requirements-dev.txt
      - name: static cross-service contract checks
        run: node scripts/contract-tests/context-governance-contract.mjs
      - name: context-fabric governance unit tests
        env:
          PYTHONPATH: context-fabric/services:context-fabric/shared
        run: python3 -m pytest context-fabric/tests/test_context_plan_governance.py

  # ─── Shell scripts — bin/ + singularity.sh + seed/apply.sh ──────────────────
  shellcheck:
    name: shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n every .sh
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            bash -n "$f" || { echo "syntax error in $f"; fail=1; }
          done < <(find . -name "*.sh" -not -path "*/node_modules/*")
          exit $fail

  # ─── SQL seed + audit-governance schema syntax check ────────────────────────
  sql-syntax:
    name: SQL seed + schema syntax
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_sql_check
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: load extensions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d ci_sql_check \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - name: apply audit-governance init schema
        env:
          PGPASSWORD: postgres
        run: psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U postgres -d ci_sql_check -f audit-governance-service/db/init.sql
      - name: smoke seed/*.sql (syntax only; expects empty agent-runtime schema)
        env:
          PGPASSWORD: postgres
        run: |
          # The two non-audit-gov seeds reference tables that only exist
          # AFTER prisma db push lands the agent-runtime / workgraph schemas
          # in the real stack. Here we only sanity-check that each file is
          # well-formed SQL via a dry-parse (psql --set=ON_ERROR_STOP without
          # actually running it isn't possible; instead use psql to compile
          # via 'EXPLAIN'... no, simpler: just run the audit-gov one which
          # is self-contained, and lint the others with `pg_query` if it
          # were installed. For now we accept that 01/02 will fail without
          # their parent schemas and check only that 03 applies clean.
          psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U postgres -d ci_sql_check -f seed/03-audit-governance.sql

  # ─── M30 schema invariants — physical DB split ──────────────────────────────
  # Composer's OWNED tables (PromptAssembly, PromptProfile, ...) live on
  # `singularity_composer`. Agent-runtime owns `singularity`. The two schemas
  # are now FULLY DISJOINT — no mirrors, no shared models.
  #
  # Composer keeps a SECOND Prisma schema (prisma/runtime-read.prisma) that
  # declares the agent-runtime models composer needs to READ. The
  # runtime-reader client is generated against that schema and connects to
  # `singularity` via DATABASE_URL_RUNTIME_READ. It NEVER pushes DDL.
  #
  # Asserts:
  #   1. agent-runtime + composer-owned schemas declare disjoint model sets
  #      (zero overlap).
  #   2. All three schemas use per-service Prisma client output paths.
  #   3. Composer's runtime-read schema is a subset of agent-runtime's models
  #      (every read-model composer declares must exist in agent-runtime).
  #   4. agent-runtime source code never references composer-owned models.
  m30-schema-ownership:
    name: M30 schema invariants (disjoint DBs + read-only subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assert per-service `output` paths on all 3 schemas
        run: |
          set -e
          for f in \
            agent-and-tools/apps/prompt-composer/prisma/schema.prisma \
            agent-and-tools/apps/prompt-composer/prisma/runtime-read.prisma \
            agent-and-tools/apps/agent-runtime/prisma/schema.prisma; do
            if ! grep -qE '^[[:space:]]+output[[:space:]]*=' "$f"; then
              echo "::error::$f is missing a per-service `output` path."
              exit 1
            fi
          done
          echo "✓ All 3 schemas use per-service Prisma client output paths."
      - name: assert composer-OWNED schema ∩ agent-runtime schema = ∅
        run: |
          set -e
          OWNED=$(grep -oE '^model [A-Za-z]+' agent-and-tools/apps/prompt-composer/prisma/schema.prisma | awk '{print $2}' | sort -u)
          RUNTIME=$(grep -oE '^model [A-Za-z]+' agent-and-tools/apps/agent-runtime/prisma/schema.prisma | awk '{print $2}' | sort -u)
          OVERLAP=$(comm -12 <(echo "$OWNED") <(echo "$RUNTIME"))
          if [ -n "$OVERLAP" ]; then
            echo "::error::M30 violation — these models are declared in BOTH agent-runtime AND composer's owned schema:"
            echo "$OVERLAP" | sed 's/^/  - /'
            echo "::error::After M30 they own separate Postgres DBs and must NOT overlap."
            exit 1
          fi
          echo "✓ composer-owned and agent-runtime schemas are disjoint."
      - name: assert composer's runtime-read schema is a SUBSET of agent-runtime
        run: |
          set -e
          READ=$(grep -oE '^model [A-Za-z]+' agent-and-tools/apps/prompt-composer/prisma/runtime-read.prisma | awk '{print $2}' | sort -u)
          RUNTIME=$(grep -oE '^model [A-Za-z]+' agent-and-tools/apps/agent-runtime/prisma/schema.prisma | awk '{print $2}' | sort -u)
          ROGUE=$(comm -23 <(echo "$READ") <(echo "$RUNTIME"))
          if [ -n "$ROGUE" ]; then
            echo "::error::composer's runtime-read schema declares models that agent-runtime does NOT own:"
            echo "$ROGUE" | sed 's/^/  - /'
            echo "::error::Add them to agent-runtime's schema or remove from runtime-read."
            exit 1
          fi
          echo "✓ Every model in composer's runtime-read schema exists in agent-runtime."
      - name: assert agent-runtime source code never references composer-owned models
        run: |
          set -e
          OWNED="promptAssembly promptProfile promptLayer promptAssemblyLayer promptProfileLayer capabilityCompiledContext"
          fail=0
          for m in $OWNED; do
            hits=$(grep -rn "prisma\.${m}\b" agent-and-tools/apps/agent-runtime/src/ 2>/dev/null | head -3 || true)
            if [ -n "$hits" ]; then
              echo "::error::agent-runtime source code references composer-owned 'prisma.${m}'"
              echo "$hits"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1
          echo "✓ No composer-owned models used in agent-runtime code."

  # ─── Docker compose files parse cleanly ─────────────────────────────────────
  compose-syntax:
    name: docker compose syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config (every compose file)
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            dir=$(dirname "$f")
            ( cd "$dir" && docker compose -f "$(basename "$f")" config -q ) \
              || { echo "compose syntax error in $f"; fail=1; }
          done < <(find . -name "docker-compose.yml" -not -path "*/node_modules/*")
          exit $fail

  # ─── Container images — build on PR, publish on main ───────────────────────
  container-images:
    name: image ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [typecheck-ts, python-syntax, context-governance-contract, shellcheck, sql-syntax, compose-syntax]
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mcp-server
            context: mcp-server
            dockerfile: Dockerfile
          - image: audit-governance-service
            context: audit-governance-service
            dockerfile: Dockerfile
          - image: context-api
            context: context-fabric
            dockerfile: services/context_api_service/Dockerfile
          - image: agent-runtime
            context: agent-and-tools
            dockerfile: apps/agent-runtime/Dockerfile
          - image: tool-service
            context: agent-and-tools
            dockerfile: apps/tool-service/Dockerfile
          - image: prompt-composer
            context: agent-and-tools
            dockerfile: apps/prompt-composer/Dockerfile
          - image: workgraph-api
            context: workgraph-studio
            dockerfile: apps/api/Dockerfile
          - image: workgraph-web
            context: workgraph-studio
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:main
