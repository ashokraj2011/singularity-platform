name: CI

# Repo CI gate (security-review finding 11). Runs the checks that catch the
# regression classes we keep hand-finding: lockfile drift, type errors, the
# Next prerender/Suspense break, compose breakage, and topology/version drift.
# Each job is independent so one failure doesn't mask the others.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-and-tools:
    name: agent-and-tools — build + typecheck (+ Next build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-and-tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent-and-tools/package-lock.json
      # `npm ci` fails if package-lock.json is out of sync (catches stale-workspace drift).
      - run: npm ci
      - name: Build shared package
        run: npm run build --workspace=packages/shared
      - name: Prisma generate (agent-runtime + prompt-composer)
        run: |
          ( cd apps/agent-runtime && npx prisma generate )
          ( cd apps/prompt-composer && npx prisma generate --schema=prisma/schema.prisma && npx prisma generate --schema=prisma/runtime-read.prisma )
      - name: Typecheck backend (agent-service serves agents + tools)
        run: |
          ( cd apps/agent-service && npx tsc --noEmit )
          ( cd apps/agent-runtime && npx tsc --noEmit )
          ( cd apps/prompt-composer && npx tsc --noEmit )
      # Workgraph-web + blueprint-workbench source is compiled into platform-web,
      # so their workspace deps must be present for the Next build.
      - name: Install workgraph-studio (compiled into platform-web)
        working-directory: workgraph-studio
        run: npm install --no-audit --no-fund
      # `next build` runs static prerender — this is what catches the
      # useSearchParams()-without-Suspense class of breakage.
      - name: Build platform-web (Next)
        run: npm run build --workspace=web
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  mcp-server:
    name: mcp-server — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  workgraph-api:
    name: workgraph-api — typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workgraph-studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # workgraph-studio has no committed lockfile yet → npm install.
      # TODO (finding 11 follow-up): commit a lockfile so this can be npm ci.
      - run: npm install --no-audit --no-fund
      - run: cd apps/api && npx prisma generate
      - run: cd apps/api && npx tsc --noEmit

  workgraph-api-integration:
    name: workgraph-api — integration (real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workgraph-studio
    # Real Postgres so the runtime's raw SQL is exercised for real. The unit suite
    # mocks prisma, so a `::uuid` cast on the TEXT `workflow_nodes.id` column
    # (Postgres 42883 `text = uuid`) type-checks + ships yet breaks join/timer/sweep
    # advancement — this job is the layer that catches that class. See
    # workgraph-studio/apps/api/test/workflow-runtime.integration.test.ts.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: workgraph
          POSTGRES_PASSWORD: workgraph
          POSTGRES_DB: workgraph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workgraph"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # startInstance() → prisma reads DATABASE_URL; TEST_DATABASE_URL un-skips the
      # suite; JWT_SECRET is gated by config.ts at import time (mirrors `npm test`).
      DATABASE_URL: postgresql://workgraph:workgraph@localhost:5432/workgraph_test
      TEST_DATABASE_URL: postgresql://workgraph:workgraph@localhost:5432/workgraph_test
      JWT_SECRET: test-jwt-secret-min-32-chars-long!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: cd apps/api && npx prisma generate
      # Apply the schema to the throwaway CI Postgres (fresh DB → no migration history needed).
      - run: cd apps/api && npx prisma db push --skip-generate
      # Scoped to the integration suite (TEST_DATABASE_URL un-skips it). Broadening CI
      # to the full vitest suite is a follow-up — many existing tests only ever ran
      # locally against :5434 and haven't been vetted for a clean-DB CI run.
      - run: cd apps/api && npx vitest run test/workflow-runtime.integration.test.ts

  python:
    name: python services — byte-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Byte-compile catches syntax errors without DBs. TODO: add pytest with a
      # postgres service for IAM + context-fabric (finding 11 follow-up).
      - name: Byte-compile IAM + context-fabric
        run: |
          python -m compileall -q singularity-iam-service/app
          python -m compileall -q context-fabric/services/context_api_service/app

  topology-and-guards:
    name: compose config + repo guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config (root — catches compose breakage)
        run: docker compose config >/dev/null
      - name: Monorepo dependency-version guard
        run: bash bin/check-monorepo-versions.sh
      - name: Compose profile matrix
        run: bash bin/check-compose-profiles.sh
      # M33 single-gateway invariant: every LLM/embedding egress goes through the
      # one tagged gateway (agent/task turns additionally via composer + context
      # fabric). The guard existed but was never wired in, so the invariant was
      # unenforced on PRs — blocking now that main passes clean.
      - name: LLM single-gateway guard
        run: bash bin/check-llm-gateway-single-source.sh
      # Secret guardrail — informational for now (flip to blocking once a first
      # green run confirms it behaves in CI).
      - name: Secret guardrails
        continue-on-error: true
        run: bash bin/check-secret-guardrails.sh
