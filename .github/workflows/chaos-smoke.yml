# M65 Slice 3C — Nightly chaos smoke run.
#
# Spins up the full Singularity stack via docker compose, waits for
# healthchecks, and runs the M65 Slice 3B chaos suite. Caught
# regressions surface as a workflow failure (and the standard GitHub
# email / Slack-via-app notification posture) — NOT as a PR-merge
# gate.
#
# This is the regression net the M64 incident exposed the absence of:
# "did the timeout math survive this week's commits?"
name: Chaos smoke (nightly)

on:
  schedule:
    # 06:00 UTC daily. Roughly off-hours for the team's normal commit
    # window; the run takes ~3-4 minutes when healthy.
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # operator can run on demand from the UI

permissions:
  contents: read

jobs:
  chaos:
    name: Run chaos suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx

      - name: Bring up the stack (full profile)
        run: |
          # The chaos suite uses the mock provider, so no real provider
          # keys are required. .env.llm-secrets is empty by default.
          : > .env.llm-secrets
          # COMPOSE_PROFILES=full so all services start regardless of
          # the operator's local default.
          COMPOSE_PROFILES=full docker compose up -d --wait
        env:
          # Defaults match docker-compose.yml's ${VAR:-...} expansions.
          AUDIT_GOV_SERVICE_TOKEN: ${{ secrets.AUDIT_GOV_SERVICE_TOKEN || 'dev-audit-gov-service-token' }}

      - name: Wait for gateway + audit-gov healthchecks
        run: |
          # docker compose --wait above gates on the per-service
          # healthcheck blocks. Belt-and-braces probe here in case
          # some service skips healthcheck.
          for i in {1..30}; do
            gw=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8001/health || echo "000")
            ag=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8500/health || echo "000")
            if [ "$gw" = "200" ] && [ "$ag" = "200" ]; then
              echo "stack ready (gw=$gw ag=$ag)"
              exit 0
            fi
            sleep 4
          done
          echo "stack not ready after 120s (last gw=$gw ag=$ag)"
          exit 1

      - name: Run chaos suite
        run: pytest tests/chaos/ -v
        env:
          LLM_GATEWAY_URL: http://localhost:8001
          AUDIT_GOV_URL: http://localhost:8500
          AUDIT_GOV_SERVICE_TOKEN: ${{ secrets.AUDIT_GOV_SERVICE_TOKEN || 'dev-audit-gov-service-token' }}

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== llm-gateway ==="
          docker logs singularity-llm-gateway --tail 200 || true
          echo
          echo "=== audit-governance ==="
          docker logs audit-governance-service --tail 200 || true
          echo
          echo "=== mcp-server ==="
          docker logs singularity-mcp-server --tail 200 || true

      - name: Tear down
        if: always()
        run: docker compose --profile full down -v
