apiVersion: v1
kind: ServiceAccount
metadata:
  name: singularity-log-collector
  namespace: singularity
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: singularity-log-collector
rules:
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: singularity-log-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: singularity-log-collector
subjects:
  - kind: ServiceAccount
    name: singularity-log-collector
    namespace: singularity
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: singularity-log-collector
  namespace: singularity
data:
  vector.yaml: |
    data_dir: /var/lib/vector
    sources:
      kubernetes:
        type: kubernetes_logs
        self_node_name: ${VECTOR_SELF_NODE_NAME}
    transforms:
      normalize:
        type: remap
        inputs: [kubernetes]
        source: |
          original_message = to_string(.message) ?? ""
          parsed, parse_error = parse_json(original_message)
          if parse_error == null && is_object(parsed) {
            . = merge!(., parsed)
          }
          if !exists(.timestamp) { .timestamp = now() }
          .service = to_string(.kubernetes.pod_labels."app.kubernetes.io/name") ?? to_string(.kubernetes.container_name) ?? "kubernetes"
          .host = to_string(.kubernetes.pod_node_name) ?? get_hostname!()
          .message = to_string(.message) ?? to_string(.msg) ?? original_message
          level_text = downcase(to_string(.level) ?? "")
          if level_text == "" {
            .level = if .stream == "stderr" { "error" } else { "info" }
          } else if includes(["trace", "debug", "info", "warn", "error", "fatal", "audit"], level_text) {
            .level = level_text
          } else {
            .level = "info"
          }
          .environment = get_env_var("SINGULARITY_ENV") ?? "production"
    sinks:
      singularity_log_lake:
        type: http
        inputs: [normalize]
        uri: ${AUDIT_GOV_URL}/api/v1/logs
        method: post
        auth:
          strategy: bearer
          token: ${AUDIT_GOV_SERVICE_TOKEN}
        encoding:
          codec: json
        batch:
          max_events: 1
          timeout_secs: 1
        buffer:
          type: disk
          max_size: 536870912
          when_full: block
        request:
          retry_attempts: 20
          retry_initial_backoff_secs: 1
          retry_max_duration_secs: 3600
          timeout_secs: 15
        healthcheck:
          enabled: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: singularity-log-collector
  namespace: singularity
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: singularity-log-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: singularity-log-collector
        vector.dev/exclude: "true"
    spec:
      serviceAccountName: singularity-log-collector
      containers:
        - name: vector
          image: timberio/vector:0.56.0-distroless-libc
          args: ["--config", "/etc/vector/vector.yaml"]
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AUDIT_GOV_URL
              value: http://audit-governance.singularity.svc.cluster.local:8500
            - name: AUDIT_GOV_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: singularity-observability
                  key: audit-gov-service-token
            - name: SINGULARITY_ENV
              value: production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/vector
              readOnly: true
            - name: data
              mountPath: /var/lib/vector
            - name: var-log
              mountPath: /var/log
              readOnly: true
            - name: var-lib
              mountPath: /var/lib
              readOnly: true
      terminationGracePeriodSeconds: 60
      volumes:
        - name: config
          configMap:
            name: singularity-log-collector
        - name: data
          hostPath:
            path: /var/lib/singularity-vector
            type: DirectoryOrCreate
        - name: var-log
          hostPath:
            path: /var/log
        - name: var-lib
          hostPath:
            path: /var/lib
