services:
  postgres:
    image: postgres:16-alpine
    container_name: platform-registry-postgres
    environment:
      POSTGRES_USER:     platform
      POSTGRES_PASSWORD: platform_secret
      POSTGRES_DB:       platform_registry
    ports:
      - "5435:5432"
    volumes:
      - platform-registry-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform_registry"]
      interval: 5s
      timeout: 3s
      retries: 20

  registry:
    build: .
    container_name: platform-registry
    environment:
      PORT:            "8090"
      DATABASE_URL:    postgresql://platform:platform_secret@postgres:5432/platform_registry
      REGISTER_TOKENS: "${REGISTER_TOKENS:-}"
      NODE_ENV:        production
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

  # M11 follow-up — distributed tracing UI (Jaeger all-in-one).
  # Other services point OTEL_EXPORTER_OTLP_ENDPOINT at host.docker.internal:4318.
  # UI: http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: platform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

volumes:
  platform-registry-pgdata: {}
