# M100 P1 — Edge gateway: the single operator origin.
#
# All six UIs are served from ONE origin under path prefixes, so the browser
# (and therefore localStorage) sees a single origin → shared session (M100 P2
# SSO). Routing strategy differs by how each app is built:
#
#   • STRIP prefix  — built Vite/CRA SPAs served by their own nginx at root.
#       The SPA is built with base=/<prefix>/ so its asset + API URLs are
#       namespaced; the edge strips /<prefix> before proxying, and the app's
#       own nginx serves the SPA + proxies /api unchanged. (workflow, workbench,
#       iam)
#   • PASS-THROUGH  — frameworks that own their own base path:
#       Next.js (agent-web, basePath=/agent) and the Vite DEV server (foundry,
#       base=/foundry/). The prefix is forwarded verbatim; the framework handles
#       it. WebSocket upgrade is forwarded for Next HMR / Vite HMR.
#
# This file is included inside the stock nginx http{} via conf.d, so the `map`
# below is valid here.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  # Docker embedded DNS so upstreams resolve lazily (a single down service
  # doesn't prevent nginx from starting).
  resolver 127.0.0.11 ipv6=off valid=10s;

  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;
  proxy_read_timeout 600s;

  # Gateway self-health (does not touch upstreams).
  location = /healthz {
    default_type application/json;
    return 200 "{\"status\":\"ok\",\"service\":\"edge-gateway\"}";
  }

  # --- Agent Studio (Next.js, basePath /agent) — PASS-THROUGH ---
  # Prefix match (no trailing slash) so /agent, /agent/, /agent/_next/* all go
  # to Next, which owns the basePath. ws upgrade carries Next HMR in dev.
  location /agent {
    set $up_agent http://agent-web:3000;
    proxy_pass $up_agent;
  }

  # --- Workflow Studio (Vite, base /workflow/) — STRIP ---
  location = /workflow { return 302 /workflow/; }
  location /workflow/ {
    set $up_workflow http://workgraph-web:80;
    rewrite ^/workflow/(.*)$ /$1 break;
    proxy_pass $up_workflow;
  }

  # --- Blueprint Workbench (Vite, base /workbench/) — STRIP + SSE ---
  # Loop-theater + test-runner stream Server-Sent Events; disable buffering and
  # extend the read timeout so long verification streams aren't cut off.
  location = /workbench { return 302 /workbench/; }
  location /workbench/ {
    set $up_workbench http://blueprint-workbench:80;
    rewrite ^/workbench/(.*)$ /$1 break;
    proxy_pass $up_workbench;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  # --- Code Foundry (Vite DEV server, base /foundry/) — PASS-THROUGH + HMR ---
  location /foundry {
    set $up_foundry http://code-foundry-web:5181;
    proxy_pass $up_foundry;
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  # --- IAM admin (Vite, base /iam/) — STRIP ---
  location = /iam { return 302 /iam/; }
  location /iam/ {
    set $up_iam http://user-and-capability:80;
    rewrite ^/iam/(.*)$ /$1 break;
    proxy_pass $up_iam;
  }

  # --- Portal (root) — owns /, /login, /api/*, /ops-health/* ---
  location / {
    set $up_portal http://portal:80;
    proxy_pass $up_portal;
  }
}
