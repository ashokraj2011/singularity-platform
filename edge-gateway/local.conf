# Local edge-gateway for BARE-METAL dev (run via bin/local-gateway.sh as an
# nginx:alpine container; the host need NOT have nginx installed).
#
# Single origin (:8085) fronting the unified platform-web (:5180) and the BLUE
# Blueprint Workbench cockpit (vite dev, :5176, base /workbench/). Single origin
# means the singularity-portal.auth localStorage token is shared, and the
# cockpit's /workbench/api/* calls reuse platform-web's working /api/workgraph
# proxy. Upstreams use host.docker.internal to reach the bare-metal host.
#
# Enter at http://localhost:8085 and drive runs there (NOT :5180 directly) so the
# CALL_WORKFLOW "Open Workbench" launch URL resolves to the blue cockpit.
worker_processes 1;
events { worker_connections 1024; }
http {
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  server {
    listen 8085;
    absolute_redirect off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_read_timeout 3600s;

    # Cockpit API (API_BASE=/workbench/api) -> reuse platform-web's /api/workgraph proxy.
    location /workbench/api/ {
      rewrite ^/workbench/api/(.*)$ /api/workgraph/$1 break;
      proxy_pass http://host.docker.internal:5180;
    }

    # Blue cockpit (vite dev server, base /workbench/). SSE/HMR friendly.
    location = /workbench { return 302 /workbench/; }
    location /workbench/ {
      proxy_pass http://host.docker.internal:5176;
      proxy_buffering off;
    }

    # Everything else -> unified platform-web (Next dev, HMR over ws).
    location / {
      proxy_pass http://host.docker.internal:5180;
    }
  }
}
