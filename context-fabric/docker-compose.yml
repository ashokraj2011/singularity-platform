services:
  context-fabric-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity_context_fabric
    ports:
      - "5542:5432"
    volumes:
      - context_fabric_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d singularity_context_fabric"]
      interval: 5s
      timeout: 5s
      retries: 10

  llm-gateway-service:
    build:
      context: .
      dockerfile: services/llm_gateway_service/Dockerfile
    env_file: .env
    environment:
      - LLM_PROVIDER_CONFIG_PATH=/etc/singularity/llm-providers.json
      - LLM_MODEL_CATALOG_PATH=/etc/singularity/mcp-models.json
      - ALLOW_CALLER_PROVIDER_OVERRIDE=${LLM_GATEWAY_ALLOW_OVERRIDE:-false}
      - PUBLIC_BASE_URL=${LLM_GATEWAY_PUBLIC_URL:-http://host.docker.internal:8001}
    ports:
      - "8001:8001"
    volumes:
      - ../.singularity:/etc/singularity:ro


  context-memory-service:
    build:
      context: .
      dockerfile: services/context_memory_service/Dockerfile
    environment:
      - CONTEXT_FABRIC_DATABASE_URL=${CONTEXT_FABRIC_DATABASE_URL:-postgresql://postgres:singularity@context-fabric-postgres:5432/singularity_context_fabric}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-http://host.docker.internal:7100}
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      - SUMMARIZER_MODEL_ALIAS=${SUMMARIZER_MODEL_ALIAS:-}
      # M11.a
      - PLATFORM_REGISTRY_URL=${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      - PUBLIC_BASE_URL=${CONTEXT_MEMORY_PUBLIC_URL:-http://host.docker.internal:8002}
    ports:
      - "8002:8002"
    depends_on:
      context-fabric-postgres:
        condition: service_healthy
      llm-gateway-service:
        condition: service_started


  metrics-ledger-service:
    build:
      context: .
      dockerfile: services/metrics_ledger_service/Dockerfile
    environment:
      - CONTEXT_FABRIC_DATABASE_URL=${CONTEXT_FABRIC_DATABASE_URL:-postgresql://postgres:singularity@context-fabric-postgres:5432/singularity_context_fabric}
      # M11.a
      - PLATFORM_REGISTRY_URL=${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      - PUBLIC_BASE_URL=${METRICS_LEDGER_PUBLIC_URL:-http://host.docker.internal:8003}
    ports:
      - "8003:8003"
    depends_on:
      context-fabric-postgres:
        condition: service_healthy

  context-api-service:
    build:
      context: .
      dockerfile: services/context_api_service/Dockerfile
    environment:

      - CONTEXT_MEMORY_URL=http://context-memory-service:8002
      - METRICS_LEDGER_URL=http://metrics-ledger-service:8003
      # M8 — orchestrator dependencies
      - COMPOSER_URL=http://host.docker.internal:3004
      - TOOL_SERVICE_URL=http://host.docker.internal:3002
      - IAM_BASE_URL=${IAM_BASE_URL:-http://host.docker.internal:8100/api/v1}
      # M9.x — persisted MCP events (drained at end of /execute)
      - CONTEXT_FABRIC_DATABASE_URL=${CONTEXT_FABRIC_DATABASE_URL:-postgresql://postgres:singularity@context-fabric-postgres:5432/singularity_context_fabric}
      # M11.a — self-register
      - PLATFORM_REGISTRY_URL=${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      - PUBLIC_BASE_URL=${CONTEXT_API_PUBLIC_URL:-http://host.docker.internal:8000}
      # M11 follow-up — bootstrap auto-mint of IAM service token
      - IAM_SERVICE_TOKEN=${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      - IAM_BOOTSTRAP_USERNAME=${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      - IAM_BOOTSTRAP_PASSWORD=${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      - MCP_DEFAULT_BASE_URL=${MCP_DEFAULT_BASE_URL:-http://host.docker.internal:7100}
      - MCP_DEFAULT_BEARER_TOKEN=${MCP_DEFAULT_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      - MCP_DEFAULT_SERVER_ID=${MCP_DEFAULT_SERVER_ID:-local-default-mcp}
      # M11 follow-up — OpenTelemetry → Jaeger
      - OTEL_SERVICE_NAME=context-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
      # M22 — central audit & governance ledger
      - AUDIT_GOV_URL=${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      - AUDIT_GOV_SERVICE_TOKEN=${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
    ports:
      - "8000:8000"
    depends_on:
      context-fabric-postgres:
        condition: service_healthy
      llm-gateway-service:
        condition: service_started
      context-memory-service:
        condition: service_started
      metrics-ledger-service:
        condition: service_started

volumes:
  context_fabric_postgres_data:
