[pytest]
# Register custom markers so they don't warn. `integration` flags live
# end-to-end tests that need the running stack (e.g. tests/test_token_savings.py);
# they self-skip unless RUN_INTEGRATION_TESTS=1. Run unit tests only with:
#   pytest -m "not integration"
markers =
    integration: live end-to-end test requiring the running stack (opt in via RUN_INTEGRATION_TESTS=1)
