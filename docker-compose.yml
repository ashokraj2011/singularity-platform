# Singularity Platform — master docker compose.
#
# Brings up the core Singularity product stack by default:
#   - IAM (shared Postgres :5432 + iam-service :8100)
#   - platform-core (one agent-and-tools backend container exposing
#                    agent-service :3001 + tool-service :3002
#                    + agent-runtime :3003 + prompt-composer :3004)
#   - context-fabric API (:8000)
#     [M65: metrics-ledger sunset — savings analytics moved to audit-gov :8500]
#   - workgraph-studio (Postgres :5434 + MinIO :9000/:9001 + api :8080)
#   - platform-web (:5180, one frontend container for all web surfaces)
#
# Runtime infrastructure is intentionally optional/deployable elsewhere:
#   - llm-gateway       profile: llm-gateway
#   - mcp-server        profile: mcp
#   - mcp-sandbox       profile: mcp
#   - formal-verifier   profile: verification
#   - prompt-compressor profile: compression
#
# Usage:
#   docker compose up -d                   # start core (default; .env COMPOSE_PROFILES=core)
#   docker compose --profile llm-gateway up -d
#   docker compose --profile mcp up -d
#   docker compose --profile full up -d    # start everything
#   docker compose up -d <service>         # start one
#   docker compose stop <service>          # stop one
#   docker compose down                    # tear everything down (keeps volumes)
#   docker compose down -v                 # tear down + delete data volumes
#
# M65 Slice 2A — Compose profiles. Every service is tagged
# (`profiles: [core, ...]` after `container_name:`). Operators can run
# subsets instead of all-or-nothing:
#   docker compose --profile core          up -d   # product app stack
#   docker compose --profile llm-gateway   up -d   # local gateway if not remote
#   docker compose --profile mcp           up -d   # local MCP runtime if not remote
#   docker compose --profile full          up -d   # all services
# .env's COMPOSE_PROFILES=core keeps plain `docker compose up -d` lightweight.
#
# Or use the wrapper:
#   ./singularity.sh up                    # = docker compose up -d
#   ./singularity.sh up platform-web       # = docker compose up -d platform-web
#   ./singularity.sh status                # = docker compose ps
#   ./singularity.sh logs api              # = docker compose logs -f workgraph-api
#
# Port map (host → container):
#   5180 platform-web (unified Next.js platform UI)
#   3001 agent-service             3002 tool-service           3003 agent-runtime
#   3004 prompt-composer
#   5182/5174/5175/5176/5181/8085 legacy frontend debug profile only
#   5432 shared app/IAM postgres   5433 deprecated IAM postgres profile only
#   5434 workgraph postgres
#   8000-8003 context-fabric       8080 workgraph-api
#   8100 IAM API                   9000-9001 MinIO

name: singularity

services:
  # ─────────────────────────────────────────────────────────────────────
  # IAM
  # ─────────────────────────────────────────────────────────────────────
  iam-postgres:
    image: postgres:16-alpine
    container_name: singularity-iam-postgres
    # M65 Slice 2A — compose profiles.
    # M67 Slice 3A — iam-service now reads from at-postgres (which also
    # hosts singularity_composer, singularity_codegen, and now
    # singularity_iam — see init.sql). This standalone Postgres is parked
    # behind `deprecated` for one operator cycle so anyone with a pinned
    # local data volume can keep it running with
    # COMPOSE_PROFILES=full,deprecated.
    profiles: [deprecated]
    environment:
      POSTGRES_USER: singularity
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity_iam
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - iam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U singularity -d singularity_iam"]
      interval: 5s
      timeout: 5s
      retries: 10
    # M35.3 — resource limits (postgres: 4G memory / 2 CPU)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  iam-service:
    build:
      context: ./singularity-iam-service
      dockerfile: Dockerfile
    container_name: singularity-iam-service
    # M65 Slice 2A — compose profiles.
    profiles: [core, full, backend-split]
    environment:
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      # M67 Slice 3A — was iam-postgres:5432; now reads from at-postgres
      # which init.sql provisions with singularity_iam DB + singularity role.
      DATABASE_URL: postgresql+asyncpg://singularity:singularity@at-postgres:5432/singularity_iam
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      JWT_EXPIRE_MINUTES: 60
      LOCAL_SUPER_ADMIN_EMAIL: ${LOCAL_SUPER_ADMIN_EMAIL:-admin@singularity.local}
      LOCAL_SUPER_ADMIN_PASSWORD: ${LOCAL_SUPER_ADMIN_PASSWORD:-Admin1234!}
      CORS_ORIGINS: '["http://localhost:5175","http://localhost:5180","http://localhost:3000","http://localhost:5174","http://localhost:5176"]'
    ports:
      - "8100:8100"
    depends_on:
      # M67 Slice 3A — was iam-postgres; flipped to at-postgres which
      # init.sql provisions with singularity_iam DB and singularity role.
      at-postgres:
        condition: service_healthy
      # M67 Slice 3A.1 — wait for the one-shot bootstrap to confirm the
      # singularity_iam DB + singularity role exist. Operators upgrading
      # through M67 Slice 3A have an existing PGDATA volume where init.sql
      # never re-ran, so without this wait iam-service crashes on first
      # boot with "password authentication failed for user singularity".
      at-postgres-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8100/api/v1/health', timeout=2).status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    # M35.3 — resource limits (IAM service: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # agent-and-tools
  # ─────────────────────────────────────────────────────────────────────
  at-postgres:
    image: pgvector/pgvector:pg16
    container_name: singularity-at-postgres
    # M65 Slice 2A — compose profiles.
    profiles: [core, full, backend-split, gateway-only, composer-only, deprecated]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - at_postgres_data:/var/lib/postgresql/data
      - ./agent-and-tools/packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # M35.3 — resource limits (postgres: 4G memory / 2 CPU)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  # M67 Slice 3A.1 — idempotent bootstrap for existing at-postgres volumes.
  # init.sql only runs on FRESH PGDATA dirs, so operators upgrading through
  # M67 Slice 3A miss the singularity_iam DB + singularity role additions
  # and iam-service crashes with "password authentication failed". This
  # one-shot container connects as the postgres superuser and idempotently
  # ensures both exist. Runs on every `up -d`; exits 0 once done so
  # dependents using service_completed_successfully can proceed.
  at-postgres-bootstrap:
    image: postgres:16-alpine
    container_name: singularity-at-postgres-bootstrap
    profiles: [core, full, backend-split, composer-only, deprecated]
    environment:
      PGHOST: at-postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: singularity
    volumes:
      - ./agent-and-tools/packages/db/bootstrap-existing-volume.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]
    depends_on:
      at-postgres:
        condition: service_healthy
    restart: "no"

  platform-core:
    build:
      context: ./agent-and-tools
      dockerfile: platform-core.Dockerfile
      args:
        ARTIFACTORY_NPM_REGISTRY: ${ARTIFACTORY_NPM_REGISTRY:-}
      secrets:
        - artifactory_npm_token
    container_name: singularity-platform-core
    profiles: [core, full]
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      DATABASE_URL_AGENT_TOOLS: postgresql://postgres:singularity@at-postgres:5432/singularity
      DATABASE_URL_COMPOSER: postgresql://postgres:singularity@at-postgres:5432/singularity_composer
      DATABASE_URL_RUNTIME_READ: postgresql://postgres:singularity@at-postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5180}
      IAM_SERVICE_URL: http://iam-service:8100
      IAM_BASE_URL: http://iam-service:8100/api/v1
      IAM_SERVICE_TOKEN: ${AGENT_RUNTIME_IAM_SERVICE_TOKEN:-}
      IAM_SERVICE_TOKEN_TENANT_IDS: ${IAM_SERVICE_TOKEN_TENANT_IDS:-}
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      CONTEXT_FABRIC_URL: http://context-api:8000
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      PROMPT_COMPOSER_SERVICE_TOKEN: ${PROMPT_COMPOSER_SERVICE_TOKEN:-${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}}
      LEARNING_SERVICE_URL: http://agent-service:3001
      WORKGRAPH_ARTIFACT_FETCH_URL: http://workgraph-api:8080/api/internal/artifacts/fetch
      WORKGRAPH_ARTIFACT_FETCH_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_INTERNAL_URL:-http://llm-gateway:8001}
      TOOL_SERVER_ENDPOINT_ALLOWLIST: ${TOOL_SERVER_ENDPOINT_ALLOWLIST:-}
      AGENT_RUN_FALLBACK_PROVIDER: stub
      AGENT_RUN_FALLBACK_MODEL: stub-model
      PROVIDER_MANIFEST_SIGNATURE_MODE: ${PROVIDER_MANIFEST_SIGNATURE_MODE:-auto}
      PROVIDER_MANIFEST_TRUSTED_KEYS: ${PROVIDER_MANIFEST_TRUSTED_KEYS:-}
      PROVIDER_MANIFEST_MAX_TTL_SECONDS: ${PROVIDER_MANIFEST_MAX_TTL_SECONDS:-2592000}
      AGENT_SOURCE_ALLOW_PRIVATE_URLS: ${AGENT_SOURCE_ALLOW_PRIVATE_URLS:-false}
      WORLD_MODEL_DISTILL_MODEL_ALIAS: ${WORLD_MODEL_DISTILL_MODEL_ALIAS:-claude-haiku-4-5-20251001}
      CAPSULE_COMPILE_MODEL_ALIAS: ${CAPSULE_COMPILE_MODEL_ALIAS:-}
      EMBEDDING_MODEL_ALIAS: ${EMBEDDING_MODEL_ALIAS:-}
    ports:
      - "3001:3001"
      - "3002:3002"
      - "3003:3003"
      - "3004:3004"
    depends_on:
      at-postgres:
        condition: service_healthy
      at-postgres-bootstrap:
        condition: service_completed_successfully
      iam-service:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - agent-service
          - tool-service
          - agent-runtime
          - prompt-composer
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const ports=[3001,3002,3003,3004];let done=0,ok=0;for(const port of ports){const req=http.get({host:'127.0.0.1',port,path:'/health'},r=>{if(r.statusCode===200)ok++;r.resume();r.on('end',()=>{done++;if(done===ports.length)process.exit(ok===ports.length?0:1);});});req.on('error',()=>process.exit(1));}setTimeout(()=>process.exit(1),5000);\""]
      interval: 10s
      timeout: 6s
      retries: 18
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '2.0'

  agent-service:
    build:
      context: ./agent-and-tools
      dockerfile: apps/agent-service/Dockerfile
    container_name: singularity-agent-service
    # M65 Slice 2A — compose profiles.
    profiles: [backend-split]
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3001
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity
      IAM_SERVICE_URL: http://iam-service:8100
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      LEARNING_SERVICE_TOKEN: ${LEARNING_SERVICE_TOKEN:-${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      TOOL_SERVER_ENDPOINT_ALLOWLIST: ${TOOL_SERVER_ENDPOINT_ALLOWLIST:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5180}
    ports:
      - "3001:3001"
    depends_on:
      at-postgres:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/agent-service/src:/app/apps/agent-service/src
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  tool-service:
    build:
      context: ./agent-and-tools
      dockerfile: apps/tool-service/Dockerfile
    container_name: singularity-tool-service
    # M65 Slice 2A — compose profiles.
    profiles: [backend-split]
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3002
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity
      IAM_SERVICE_URL: http://iam-service:8100
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5180}
    ports:
      - "3002:3002"
    depends_on:
      at-postgres:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/tool-service/src:/app/apps/tool-service/src
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  agent-runtime:
    build:
      context: ./agent-and-tools
      dockerfile: apps/agent-runtime/Dockerfile
      target: dev
    container_name: singularity-agent-runtime
    # M65 Slice 2A — compose profiles.
    profiles: [backend-split]
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3003
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      LOG_LEVEL: info
      # agent-runtime never calls a provider directly. These two
      # vars are informational fallbacks stamped onto AgentExecution rows
      # when no model_alias is supplied; real LLM work goes through MCP.
      AGENT_RUN_FALLBACK_PROVIDER: stub
      AGENT_RUN_FALLBACK_MODEL: stub-model
      PROVIDER_MANIFEST_SIGNATURE_MODE: ${PROVIDER_MANIFEST_SIGNATURE_MODE:-auto}
      PROVIDER_MANIFEST_TRUSTED_KEYS: ${PROVIDER_MANIFEST_TRUSTED_KEYS:-}
      PROVIDER_MANIFEST_MAX_TTL_SECONDS: ${PROVIDER_MANIFEST_MAX_TTL_SECONDS:-2592000}
      AGENT_SOURCE_ALLOW_PRIVATE_URLS: ${AGENT_SOURCE_ALLOW_PRIVATE_URLS:-false}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      IAM_SERVICE_URL: http://iam-service:8100
      IAM_BASE_URL: http://iam-service:8100/api/v1
      IAM_SERVICE_TOKEN: ${AGENT_RUNTIME_IAM_SERVICE_TOKEN:-}
      IAM_SERVICE_TOKEN_TENANT_IDS: ${IAM_SERVICE_TOKEN_TENANT_IDS:-}
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      # LLM-based world-model distillation at capability onboarding (bootstrap
      # Phase 3). When WORLD_MODEL_DISTILL_MODEL_ALIAS is set, the README is
      # distilled through the gateway; unset → heuristic fallback. This is the
      # only path where agent-runtime calls the gateway directly.
      LLM_GATEWAY_URL: ${LLM_GATEWAY_INTERNAL_URL:-http://llm-gateway:8001}
      WORLD_MODEL_DISTILL_MODEL_ALIAS: ${WORLD_MODEL_DISTILL_MODEL_ALIAS:-claude-haiku-4-5-20251001}
    ports:
      - "3003:3003"
    depends_on:
      at-postgres:
        condition: service_healthy
      at-postgres-bootstrap:
        condition: service_completed_successfully
      llm-gateway:
        condition: service_healthy
        required: false
    volumes:
      - ./agent-and-tools/apps/agent-runtime/src:/app/apps/agent-runtime/src
      - ./agent-and-tools/apps/agent-runtime/prisma:/app/apps/agent-runtime/prisma
      # NOTE: generated/prisma-client is intentionally NOT bind-mounted.
      # The Prisma engine binaries are platform-specific; the host
      # (macOS) and container (Alpine linux-musl-arm64) need different
      # ones. Operators who edit schema.prisma should re-run
      # `prisma generate` INSIDE the container:
      #   docker exec singularity-agent-runtime npx prisma generate
      # then restart the container so ts-node-dev reloads the new
      # client. The schema itself flows via the prisma/ bind mount.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  prompt-composer:
    build:
      context: ./agent-and-tools
      dockerfile: apps/prompt-composer/Dockerfile
      target: dev
    container_name: singularity-prompt-composer
    # M65 Slice 2A — compose profiles.
    profiles: [backend-split, composer-only]
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3004
      # M30 — composer owns `singularity_composer` (PromptAssembly etc.) and
      # reads agent-runtime models from `singularity` via runtime-reader.
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity_composer
      DATABASE_URL_RUNTIME_READ: postgresql://postgres:singularity@at-postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      LOG_LEVEL: info
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      CONTEXT_FABRIC_URL: http://context-api:8000
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      PROMPT_COMPOSER_SERVICE_TOKEN: ${PROMPT_COMPOSER_SERVICE_TOKEN:-${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}}
      # M67 Slice 1A — points at agent-service (learning-service was folded in)
      LEARNING_SERVICE_URL: http://agent-service:3001
      LEARNING_SERVICE_TOKEN: ${LEARNING_SERVICE_TOKEN:-${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}}
      WORKGRAPH_ARTIFACT_FETCH_URL: http://workgraph-api:8080/api/internal/artifacts/fetch
      WORKGRAPH_ARTIFACT_FETCH_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      # Composer's capsule compiler + model catalog lookups flow through MCP.
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      CAPSULE_COMPILE_MODEL_ALIAS: ${CAPSULE_COMPILE_MODEL_ALIAS:-}
      EMBEDDING_MODEL_ALIAS:       ${EMBEDDING_MODEL_ALIAS:-}
    ports:
      - "3004:3004"
    depends_on:
      at-postgres:
        condition: service_healthy
      at-postgres-bootstrap:
        condition: service_completed_successfully
      llm-gateway:
        condition: service_healthy
        required: false
    volumes:
      - ./agent-and-tools/apps/prompt-composer/src:/app/apps/prompt-composer/src
      - ./agent-and-tools/apps/prompt-composer/prisma:/app/apps/prompt-composer/prisma
      # Same caveat as agent-runtime: generated/prisma-client is not
      # bind-mounted because the platform-specific engine binaries
      # would conflict. Re-run prisma generate in-container after
      # schema edits:
      #   docker exec singularity-prompt-composer npx prisma generate
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # M67 Slice 1A — learning-service was folded into agent-service. The routes
  # (/api/v1/failures, /patterns, /state, /similar-capabilities, /summarize)
  # are now served by singularity-agent-service on :3001 against the
  # `learning.*` schema in the `singularity` DB. The standalone code lives
  # under agent-and-tools/apps/learning-service/ as a deprecation marker
  # for one operator cycle.

  # ─────────────────────────────────────────────────────────────────────
  # M42.6 — Legacy Code Foundry approval UI. Platform Web serves the canonical
  # /foundry routes; this dev server is retained only for direct debugging.
  # ─────────────────────────────────────────────────────────────────────
  code-foundry-web:
    build:
      context: ./singularity-code-foundry
      dockerfile: apps/code-foundry-web/Dockerfile
    container_name: singularity-code-foundry-web
    # Legacy/debug UI only. The normal /foundry route is served by platform-web.
    profiles: [frontend-legacy]
    environment:
      NODE_ENV: development
      VITE_FOUNDRY_API_URL: http://workgraph-api:8080
      # M100 P1 — served under /foundry/ by the edge gateway. This is a Vite DEV
      # server, so the base path is read at runtime (not a build arg).
      BASE_PATH: /foundry/
    ports:
      - "5181:5181"
    volumes:
      - ./singularity-code-foundry/apps/code-foundry-web/src:/app/apps/code-foundry-web/src
      - ./singularity-code-foundry/apps/code-foundry-web/index.html:/app/apps/code-foundry-web/index.html
      - ./singularity-code-foundry/apps/code-foundry-web/public:/app/apps/code-foundry-web/public
    # Debug-only UI. Start the core stack separately when live API data is
    # needed; avoiding depends_on keeps the legacy profile isolated.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  platform-web:
    build:
      context: .
      dockerfile: agent-and-tools/web/Dockerfile
      args:
        ARTIFACTORY_NPM_REGISTRY: ${ARTIFACTORY_NPM_REGISTRY:-}
      secrets:
        - artifactory_npm_token
    container_name: singularity-platform-web
    profiles: [core, full, backend-split]
    environment:
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      NEXT_PUBLIC_AGENT_SERVICE_URL: http://localhost:3001
      NEXT_PUBLIC_TOOL_SERVICE_URL: http://localhost:3002
      NEXT_PUBLIC_AGENT_RUNTIME_URL: http://localhost:3003
      NEXT_PUBLIC_PROMPT_COMPOSER_URL: http://localhost:3004
      NEXT_PUBLIC_WORKGRAPH_WEB_URL: /workflows
      AGENT_SERVICE_URL: http://agent-service:3001
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
      WORKGRAPH_API_URL: http://workgraph-api:8080
      CONTEXT_FABRIC_URL: http://context-api:8000
      EVENT_HORIZON_MODEL_ALIAS: ${EVENT_HORIZON_MODEL_ALIAS:-}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      LLM_GATEWAY_URL: ${LLM_GATEWAY_INTERNAL_URL:-http://llm-gateway:8001}
      LLM_GATEWAY_BEARER: ${LLM_GATEWAY_BEARER:-}
      FORMAL_VERIFIER_URL: ${FORMAL_VERIFIER_INTERNAL_URL:-http://formal-verifier:8010}
      IAM_BASE_URL: http://iam-service:8100/api/v1
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      TENANT_ISOLATION_MODE: ${TENANT_ISOLATION_MODE:-off}
      REQUIRE_TENANT_ID: ${REQUIRE_TENANT_ID:-false}
      IAM_SERVICE_TOKEN_TENANT_IDS: ${IAM_SERVICE_TOKEN_TENANT_IDS:-}
      WORKGRAPH_PROXY_SERVICE_AUTH: ${WORKGRAPH_PROXY_SERVICE_AUTH:-true}
      WORKGRAPH_PROXY_SERVICE_TOKEN: ${WORKGRAPH_PROXY_SERVICE_TOKEN:-}
      PROMPT_COMPOSER_SERVICE_TOKEN: ${PROMPT_COMPOSER_SERVICE_TOKEN:-${WORKGRAPH_PROXY_SERVICE_TOKEN:-}}
      IAM_HEALTH_URL: http://iam-service:8100
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
    ports:
      - "5180:80"
    depends_on:
      workgraph-api:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      context-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # context-fabric
  # ─────────────────────────────────────────────────────────────────────


  context-memory:
    build:
      context: ./context-fabric
      dockerfile: services/context_memory_service/Dockerfile
    container_name: singularity-context-memory
    # M65 Slice 2A — compose profiles.
    # M67 Slice 2A — routes folded into context-api. The standalone service
    # is parked behind a `deprecated` profile so operators with explicit
    # CONTEXT_MEMORY_URL=http://context-memory:8002 can still run it for
    # one cycle:
    #   `COMPOSE_PROFILES=full,deprecated docker compose up -d`
    profiles: [deprecated]
    # context-memory routes its summarizer through MCP, never hits a provider
    # or LLM gateway directly.
    environment:
      CONTEXT_FABRIC_DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity_context_fabric
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      SUMMARIZER_MODEL_ALIAS: ${SUMMARIZER_MODEL_ALIAS:-}
    ports:
      - "8002:8002"
    depends_on:
      at-postgres:
        condition: service_healthy
      at-postgres-bootstrap:
        condition: service_completed_successfully
      llm-gateway:
        condition: service_healthy
    # M35.3 — resource limits (memory service: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # M65 Slice 1B — metrics-ledger removed.
  #
  # Token-savings analytics moved to audit-gov (M65 Slice 1A). The old
  # host file under context-fabric/data/metrics_ledger/ is only retained
  # as an operator archive; the runtime Context Fabric store is Postgres.
  # Source code stays in tree at context-fabric/services/metrics_ledger_service/
  # marked deprecated; will be removed in M66.

  context-api:
    build:
      context: ./context-fabric
      dockerfile: services/context_api_service/Dockerfile
    container_name: singularity-context-api
    # M65 Slice 2A — compose profiles.
    profiles: [core, full, backend-split]
    # context-api orchestrates but doesn't call providers or the LLM gateway
    # directly. LLM traffic routes through MCP.
    environment:
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      # M67 Slice 1C — context-memory's routes are now in-process inside
      # context-api. Leaving CONTEXT_MEMORY_URL set so the one remaining
      # internal proxy (/sessions/{id}/messages) hits a valid host; the
      # localhost hop is cheap and a future cleanup can switch it to a
      # direct function call.
      CONTEXT_MEMORY_URL: http://localhost:8000
      # M67 Slice 1C — was context-memory's own store; now backed by
      # Postgres through CONTEXT_FABRIC_DATABASE_URL.
      CONTEXT_FABRIC_DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity_context_fabric
      # Fallback only. Normal Docker uses CONTEXT_FABRIC_DATABASE_URL above, but
      # keep SQLite paths app-local and volume-backed so misconfigured dev runs
      # do not try to mkdir a read-only root-level /data directory.
      CALL_LOG_DB: /app/data/call_log.db
      EVENTS_STORE_DB: /app/data/call_log_events.db
      CONTEXT_MEMORY_DB: /app/data/context_memory.db
      SUMMARIZER_MODEL_ALIAS: ${SUMMARIZER_MODEL_ALIAS:-}
      # M65 Slice 1B — METRICS_LEDGER_URL removed. /metrics/dashboard and
      # /sessions/{id}/metrics now proxy to audit-gov (AUDIT_GOV_URL below).
      # If a legacy caller still references this env var the proxy fall-back
      # returns 404 — preferred over silently routing to a dead host.
      COMPOSER_URL: http://prompt-composer:3004
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
      PROMPT_COMPOSER_SERVICE_TOKEN: ${PROMPT_COMPOSER_SERVICE_TOKEN:-${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}}
      IAM_BASE_URL: http://iam-service:8100/api/v1
      REQUIRE_TENANT_ID: ${REQUIRE_TENANT_ID:-false}
      DEFAULT_GOVERNANCE_MODE: ${DEFAULT_GOVERNANCE_MODE:-fail_open}
      IAM_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      IAM_SERVICE_TOKEN_TENANT_IDS: ${IAM_SERVICE_TOKEN_TENANT_IDS:-}
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      # Laptop-bridge device tokens are SIGNED by iam-service and VERIFIED here
      # (laptop_bridge.py). Must be the same value as iam-service's JWT_SECRET or
      # every laptop connect is rejected 403 "signature mismatch". Was missing —
      # context-api was the one service compose didn't give the shared secret.
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      MCP_DEFAULT_BASE_URL: ${MCP_DEFAULT_BASE_URL:-http://mcp-server:7100}
      MCP_DEFAULT_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      # Normal execution uses /api/runtime-bridge/connect. MCP_SERVER_URL and
      # LLM_GATEWAY_URL are diagnostics/debug fallback only when this is true.
      RUNTIME_HTTP_FALLBACK_ENABLED: ${RUNTIME_HTTP_FALLBACK_ENABLED:-false}
      MCP_DEFAULT_SERVER_ID: ${MCP_DEFAULT_SERVER_ID:-local-default-mcp}
      # ── ToolInvocationGrant (defence-in-depth) ──────────────────────────
      # The governed loop signs a per-call grant binding (tool, args,
      # stage/phase/policy); mcp-server verifies it before running mutating /
      # high-risk tools. OFF by default. Flip CF_TOOL_GRANT_ENABLED=true here
      # AND set MCP_TOOL_GRANT_MODE=grace|enforce on mcp-server, sharing the
      # SAME TOOL_GRANT_SIGNING_SECRET on both.
      CF_TOOL_GRANT_ENABLED: ${CF_TOOL_GRANT_ENABLED:-false}
      TOOL_GRANT_SIGNING_SECRET: ${TOOL_GRANT_SIGNING_SECRET:-dev-tool-grant-signing-secret-min-32-chars!!}
      CF_TOOL_GRANT_TTL_SEC: ${CF_TOOL_GRANT_TTL_SEC:-120}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      # M83.r (2026-05-27) — Anthropic extended thinking budget in
      # output tokens. 0 = off (default). 4096 is the empirical sweet
      # spot for stage-level reasoning on Claude 4 (Sonnet/Opus 4.x);
      # smaller models silently ignore. Effective only on Anthropic
      # providers — the gateway's openai_compat path doesn't include
      # the thinking parameter. Set in .env to opt the whole stack
      # in. Thinking tokens are billed but stay model-internal —
      # workbench surfaces them via LoopTrace's "Deep reasoning"
      # section so operators can debug "why did the agent do that?"
      # without the model having to externalize the reasoning as
      # prose tool calls.
      DEEP_REASONING_BUDGET_TOKENS: ${DEEP_REASONING_BUDGET_TOKENS:-4096}
      # M61 Wire 2 — agent-runtime is the source of truth for the
      # CapabilityWorldModel row. context-api fetches it (GET
      # /capabilities/:id/world-model) at /execute time and forwards
      # it to prompt-composer so the Slice F renderers can emit
      # CODE_AGENT_RULES + CODE_WORLD_MODEL layers.
      #
      # Hardcoded to the compose-internal hostname (not
      # ${AGENT_RUNTIME_URL:-…}) so the host-side .env value
      # `AGENT_RUNTIME_URL=http://localhost:3003` — meant for scripts
      # running outside docker — doesn't leak in and resolve to
      # context-api's own loopback inside the container.
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      # M62 Slice E — Per-layer prompt compression. When
      # COMPRESSION_ENABLED=true, context-api adds a `compression`
      # block to the compose request body so prompt-composer compresses
      # over-budget allowlisted layers via the prompt-compressor sidecar.
      # Default OFF — flip in .env to activate.
      COMPRESSOR_URL: http://prompt-compressor:8011
      COMPRESSION_ENABLED: ${COMPRESSION_ENABLED:-false}
      COMPRESSION_PER_LAYER_BUDGET_TOKENS: ${COMPRESSION_PER_LAYER_BUDGET_TOKENS:-1500}
      # M64 — Compatibility timeout for legacy Context Fabric MCP dispatch.
      # Must exceed mcp-server's TIMEOUT_SEC (300) plus subscriber-drain
      # window (about 1s). 480s = 8 min headroom.
      CONTEXT_FABRIC_MCP_INVOKE_TIMEOUT_SEC: ${CONTEXT_FABRIC_MCP_INVOKE_TIMEOUT_SEC:-480}
      # M65 Slice 1A — audit-gov is the canonical home for token-savings
      # analytics. /metrics/dashboard and /sessions/{id}/metrics proxy
      # here when set; legacy metrics-ledger remains as fallback during
      # the M65 transition.
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      # M99 platform-driven pre-edit guards — dark-launch rollout flags.
      # Each pairs with the stage's auto*/gitPreflightRequired policy flag
      # (BOTH the env flag here AND the per-stage policy flag must be on —
      # see governed_automation.automation_enabled). Enabled so
      # capture_test_baseline auto-dispatches in EXPLORE before the first
      # edit, letting the verification gate tell pre-existing test failures
      # apart from new regressions. Override per-env via .env.
      CF_AUTO_BASELINE_ENABLED: ${CF_AUTO_BASELINE_ENABLED:-true}
      CF_GIT_PREFLIGHT_ENABLED: ${CF_GIT_PREFLIGHT_ENABLED:-true}
      CF_AUTO_VERIFY_ENABLED: ${CF_AUTO_VERIFY_ENABLED:-true}
    ports:
      - "8000:8000"
    volumes:
      - context_api_data:/app/data
    depends_on:
      at-postgres:
        condition: service_healthy
      at-postgres-bootstrap:
        condition: service_completed_successfully
      iam-service:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
        required: false
      # M67 Slice 1C — context-memory dep removed; routes are now in-process.
      # M65 Slice 1B — metrics-ledger removed from depends_on.
      mcp-server:
        condition: service_started
        required: false
    # M35.3 — resource limits (orchestrator: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M60 Slice 1 — Formal Verifier (Z3-backed SMT proofs)
  #
  # Pure verifier: receives a constraint payload + query, returns
  # SAT/UNSAT/UNKNOWN with a hash and (optionally) a counterexample.
  # No provider keys, no outbound HTTP. DATABASE_URL is intentionally
  # left empty so persistence is skipped in dev — flip on later by
  # pointing at a Postgres + running `ensure_schema`.
  #
  # Consumers:
  #   - mcp-server (formal_verify tool + finish_work_branch gate)
  #   - workgraph-api   (Governance Path Analyzer / deployment gate)
  # Both reach it via http://formal-verifier:8010 inside the compose
  # network. FORMAL_VERIFICATION_ENABLED governs whether either consumer
  # actually calls it — the service starts regardless so health is
  # observable from /api/v1/verification/status.
  # ─────────────────────────────────────────────────────────────────────
  formal-verifier:
    build:
      context: ./context-fabric
      dockerfile: services/formal_verifier_service/Dockerfile
    container_name: singularity-formal-verifier
    # M65 Slice 2A — compose profiles.
    profiles: [full, verification]
    environment:
      LOG_LEVEL: info
      # Pydantic-settings reads these as snake_case fields, but env vars
      # are matched case-insensitively against the field name.
      FORMAL_VERIFICATION_ENABLED: ${FORMAL_VERIFICATION_ENABLED:-false}
      DEFAULT_TIMEOUT_MS: ${FORMAL_VERIFICATION_DEFAULT_TIMEOUT_MS:-3000}
      MAX_TIMEOUT_MS: ${FORMAL_VERIFICATION_MAX_TIMEOUT_MS:-10000}
      # Leave empty to disable persistence (dev default). To enable, point
      # at a Postgres URL — schema is created on first call.
      DATABASE_URL: ${FORMAL_VERIFIER_DATABASE_URL:-}
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8010/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M62 — Prompt Compressor (LLMLingua-2 sidecar)
  #
  # Local prompt compression for verbose ambient layers (CLAUDE.md,
  # RUNTIME_EVIDENCE) before they hit the LLM. ZERO runtime network:
  # the llmlingua-2 BERT base model (~180MB) is baked into the image
  # at build time, and the container runs with TRANSFORMERS_OFFLINE=1
  # so a stale model name can't trigger an outbound HuggingFace fetch.
  # Office / air-gapped friendly.
  #
  # Consumers:
  #   - prompt-composer (M62 Slice D) — opt-in per-layer compression
  #     against an explicit allowlist (CODE_AGENT_RULES, RUNTIME_EVIDENCE
  #     by default). Layers not in the allowlist are never compressed.
  #
  # Reached at http://prompt-compressor:8011 from inside the network.
  # COMPRESSION_ENABLED governs whether the compressor instance loads;
  # the service itself starts regardless so /health is observable.
  # ─────────────────────────────────────────────────────────────────────
  prompt-compressor:
    build:
      context: ./context-fabric
      dockerfile: services/prompt_compressor_service/Dockerfile
    container_name: singularity-prompt-compressor
    # M65 Slice 2A — compose profiles.
    profiles: [full, compression]
    environment:
      LOG_LEVEL: info
      COMPRESSION_ENABLED: ${COMPRESSION_ENABLED:-true}
      # M62 Slice F — strategy switch. Default "stopwords" is the
      # fast deterministic path with no ML deps; flip to "llmlingua"
      # to use the BERT-based importance model (requires the
      # COMPRESSION_BAKE_MODEL build-arg to be set to a real model id
      # so the weights are present in the image — see Dockerfile).
      COMPRESSION_STRATEGY: ${COMPRESSION_STRATEGY:-stopwords}
      COMPRESSION_MODEL_NAME: ${COMPRESSION_MODEL_NAME:-microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank}
      COMPRESSION_DEVICE: ${COMPRESSION_DEVICE:-cpu}
      COMPRESSION_LAZY_LOAD: ${COMPRESSION_LAZY_LOAD:-true}
      COMPRESSION_MIN_TARGET_TOKENS: ${COMPRESSION_MIN_TARGET_TOKENS:-20}
      COMPRESSION_MAX_INPUT_CHARS: ${COMPRESSION_MAX_INPUT_CHARS:-200000}
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8011/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          # 2G covers BERT base (~600MB resident) + tokenizer state +
          # request buffers with headroom. Bump to 3G if switching to
          # llmlingua-2 BERT large.
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M33 — LLM Gateway (the ONLY service that holds provider keys)
  # ─────────────────────────────────────────────────────────────────────
  llm-gateway:
    build:
      context: ./context-fabric
      dockerfile: services/llm_gateway_service/Dockerfile
    container_name: singularity-llm-gateway
    # M65 Slice 2A — compose profiles.
    profiles: [full, llm-gateway, gateway-only, composer-only, deprecated]
    # M53 — Provider credentials are read from .env.llm-secrets via env_file
    # (NOT via ${...} shell substitution), so an empty `ANTHROPIC_API_KEY` in
    # the operator's shell can never shadow the real value during a
    # `docker compose up --force-recreate`. The fix root-causes the recurring
    # "Missing credential" 503s after every gateway recreate. The file is
    # gitignored alongside .env and lives only on operator hosts.
    env_file:
      - .env.llm-secrets
    environment:
      LOG_LEVEL: info
      # External config files declare providers + model aliases. Mounted RO.
      LLM_PROVIDER_CONFIG_PATH: /etc/singularity/llm-providers.json
      LLM_MODEL_CATALOG_PATH:   /etc/singularity/llm-models.json
      # Optional bearer that every consumer must present. Empty = open in dev.
      LLM_GATEWAY_BEARER: ${LLM_GATEWAY_BEARER:-}
      # When ALLOW_CALLER_PROVIDER_OVERRIDE=false the gateway refuses
      # explicit provider/model overrides and forces model_alias use.
      ALLOW_CALLER_PROVIDER_OVERRIDE: ${LLM_GATEWAY_ALLOW_OVERRIDE:-false}
      UPSTREAM_TIMEOUT_SEC: ${LLM_GATEWAY_TIMEOUT_SEC:-300}
      # M62 hotfix — default bumped from 1 to 2 so Anthropic 529
      # (overloaded_error) and 503 (upstream down) transient blips
      # get absorbed transparently before they surface as
      # MCP_INVOKE_FAILED → "send back to an earlier stage" in the
      # workbench. Operators override via .env for noisier upstreams.
      LLM_GATEWAY_RATE_LIMIT_RETRIES: ${LLM_GATEWAY_RATE_LIMIT_RETRIES:-2}
      LLM_GATEWAY_RATE_LIMIT_RETRY_DELAY_SEC: ${LLM_GATEWAY_RATE_LIMIT_RETRY_DELAY_SEC:-65}
      LLM_GATEWAY_RATE_LIMIT_MAX_SLEEP_SEC: ${LLM_GATEWAY_RATE_LIMIT_MAX_SLEEP_SEC:-75}
      # Provider credentials — passed ONLY to this service. Every other
      # service in the stack is enforced to NOT receive these keys (CI guard
      # in M33.7).
      #
      # M53 — Sourced from .env.llm-secrets via env_file above (NOT shell
      # ${VAR:-} substitution). docker compose's `environment:` block
      # OVERRIDES `env_file:` values, so OPENAI_API_KEY / OPENROUTER_API_KEY /
      # ANTHROPIC_API_KEY / COPILOT_TOKEN are intentionally absent here —
      # do not re-add them. If you need to add a NEW provider key, add it
      # to .env.llm-secrets only.
      ANTHROPIC_VERSION:  ${ANTHROPIC_VERSION:-2023-06-01}
      PUBLIC_BASE_URL:    http://llm-gateway:8001
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./.singularity:/etc/singularity:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    # M35.3 — resource limits (LLM gateway: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # workgraph-studio
  # ─────────────────────────────────────────────────────────────────────
  wg-postgres:
    image: postgres:16-alpine
    container_name: singularity-wg-postgres
    # M65 Slice 2A — compose profiles.
    profiles: [core, full, backend-split]
    environment:
      POSTGRES_DB: workgraph
      POSTGRES_USER: workgraph
      POSTGRES_PASSWORD: workgraph_secret
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - wg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workgraph"]
      interval: 5s
      timeout: 5s
      retries: 10
    # M35.3 — resource limits (postgres: 4G memory / 2 CPU)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  wg-postgres-bootstrap:
    image: postgres:16-alpine
    container_name: singularity-wg-postgres-bootstrap
    profiles: [core, full, backend-split]
    environment:
      PGHOST: wg-postgres
      PGPORT: 5432
      PGUSER: workgraph
      PGPASSWORD: workgraph_secret
      POSTGRES_DB: workgraph
      POSTGRES_USER: workgraph
      WORKGRAPH_APP_DB_USER: ${WORKGRAPH_APP_DB_USER:-workgraph_app}
      WORKGRAPH_APP_DB_PASSWORD: ${WORKGRAPH_APP_DB_PASSWORD:-workgraph_app_secret}
    volumes:
      - ./workgraph-studio/apps/api/prisma/bootstrap-app-role.sh:/bootstrap-workgraph.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap-workgraph.sh"]
    depends_on:
      wg-postgres:
        condition: service_healthy
    restart: "no"

  wg-minio:
    image: minio/minio:latest
    container_name: singularity-wg-minio
    # M65 Slice 2A — compose profiles.
    profiles: [core, full, backend-split]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workgraph
      MINIO_ROOT_PASSWORD: workgraph_secret
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - wg_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    # M35.3 — resource limits (object storage: 1G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  workgraph-api:
    build:
      context: ./workgraph-studio
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: singularity-workgraph-api
    # M65 Slice 2A — compose profiles.
    profiles: [core, full, backend-split]
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-${SINGULARITY_ENV:-development}}
      ENVIRONMENT: ${ENVIRONMENT:-${SINGULARITY_ENV:-${APP_ENV:-development}}}
      SINGULARITY_ENV: ${SINGULARITY_ENV:-${APP_ENV:-development}}
      PORT: 8080
      DATABASE_URL: postgresql://${WORKGRAPH_APP_DB_USER:-workgraph_app}:${WORKGRAPH_APP_DB_PASSWORD:-workgraph_app_secret}@wg-postgres:5432/workgraph
      WORKGRAPH_RUNTIME_DATABASE_URL: postgresql://${WORKGRAPH_APP_DB_USER:-workgraph_app}:${WORKGRAPH_APP_DB_PASSWORD:-workgraph_app_secret}@wg-postgres:5432/workgraph
      WORKGRAPH_DATABASE_URL_ADMIN: postgresql://workgraph:workgraph_secret@wg-postgres:5432/workgraph
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      MINIO_ENDPOINT: wg-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: workgraph
      MINIO_SECRET_KEY: workgraph_secret
      MINIO_BUCKET: workgraph-documents
      WORKGRAPH_INTERNAL_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      WORKGRAPH_INCOMING_EVENT_SECRETS: '${WORKGRAPH_INCOMING_EVENT_SECRETS:-{"agent-runtime":"dev-workgraph-incoming-event-secret-min-32-chars","agent-service":"dev-workgraph-incoming-event-secret-min-32-chars","tool-service":"dev-workgraph-incoming-event-secret-min-32-chars","iam":"dev-workgraph-incoming-event-secret-min-32-chars"}}'
      # M84.s6 — when 'true', the first-class WorkbenchStage tables are the
      # sole source of truth: the legacy loopDefinition JSON-blob write-through
      # (workbench-definitions.service), the form-save PATCH promote
      # (instances.router), and the executor's activate-time promote
      # (WorkbenchTaskExecutor) all become no-ops. Default 'false' keeps the
      # bidirectional mirror in place so the existing NodeInspector accordion
      # form (which still mutates config.workbench.loopDefinition directly)
      # keeps working. Flip to 'true' after the form has been rewired to
      # the M84.s2 API.
      WORKBENCH_TABLES_AUTHORITATIVE: ${WORKBENCH_TABLES_AUTHORITATIVE:-false}
      # M94 (2026-05-28) — Multinode workbench. When 'true', the agentic
      # starter generates a profile=workbench child workflow with each
      # phase (Story Intake / Design / Develop / QA) as its own
      # WORKBENCH_TASK node, threaded by a single shared BlueprintSession
      # (keyed by the child workflowInstanceId). Default 'false' = the
      # legacy single-node graph. ⚠️ The multinode runtime threading is
      # NOT YET stack-verified — keep off in production until the M94.5
      # E2E checklist passes.
      WORKBENCH_MULTINODE: ${WORKBENCH_MULTINODE:-false}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5176,http://localhost:5180
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
      AUTH_PROVIDER: iam
      TENANT_ISOLATION_MODE: ${TENANT_ISOLATION_MODE:-off}
      DEFAULT_GOVERNANCE_MODE: ${DEFAULT_GOVERNANCE_MODE:-fail_open}
      # Default workflow AGENT_TASK execution to Context Fabric's governed
      # stage path. Explicit node opt-out remains available for incident
      # recovery/migration replay.
      WORKGRAPH_FORCE_GOVERNED_CODING: ${WORKGRAPH_FORCE_GOVERNED_CODING:-true}
      # Event Horizon chat uses the governed single-turn path by default.
      CONTEXT_FABRIC_GOVERN_SIDE_CALLERS: ${CONTEXT_FABRIC_GOVERN_SIDE_CALLERS:-true}
      IAM_BASE_URL: http://iam-service:8100/api/v1
      IAM_SERVICE_TOKEN_TENANT_IDS: ${IAM_SERVICE_TOKEN_TENANT_IDS:-}
      WORKGRAPH_INTERNAL_TOKEN_TENANT_IDS: ${WORKGRAPH_INTERNAL_TOKEN_TENANT_IDS:-}
      # Service-to-service IAM auth for the workflow runtime (e.g. Epic→child
      # capability-relationship discovery). Auto-mints a service token via these
      # bootstrap creds — same dev defaults other services already use.
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      AGENT_SERVICE_URL: http://agent-service:3001
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      CONTEXT_FABRIC_URL: http://context-api:8000
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      MCP_SERVER_URL: ${MCP_SERVER_INTERNAL_URL:-http://mcp-server:7100}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      MCP_TOOL_GRANT_MODE: ${MCP_TOOL_GRANT_MODE:-off}
      MCP_REQUIRE_EFFECTIVE_CAPABILITIES: ${MCP_REQUIRE_EFFECTIVE_CAPABILITIES:-false}
      MCP_SESSION_JWT_SECRET: ${MCP_SESSION_JWT_SECRET:-dev-mcp-session-secret-min-32-chars!!}
      # M60 Slice 1 — Formal verification gate (Z3). Disabled by default;
      # flip FORMAL_VERIFICATION_ENABLED=true in .env to activate. URL is
      # the compose-internal hostname, not localhost.
      FORMAL_VERIFICATION_ENABLED: ${FORMAL_VERIFICATION_ENABLED:-false}
      FORMAL_VERIFIER_URL: ${FORMAL_VERIFIER_INTERNAL_URL:-http://formal-verifier:8010}
      FORMAL_VERIFICATION_TIMEOUT_MS: ${FORMAL_VERIFICATION_DEFAULT_TIMEOUT_MS:-3000}
      WORKBENCH_DEFAULT_MODEL_ALIAS: ${WORKBENCH_DEFAULT_MODEL_ALIAS:-}
      EVENT_HORIZON_MODEL_ALIAS: ${EVENT_HORIZON_MODEL_ALIAS:-}
      # Phased Agent Reasoning Model (v4) — opt-in. When true, developer
      # stages are launched with agentReasoningMode="phased" so mcp-server
      # runs them under the 6-phase state machine. Read-only stages (PLAN,
      # DESIGN, QA_REVIEW) continue to use the flat loop regardless.
      WORKBENCH_AGENT_PHASES_ENABLED: ${WORKBENCH_AGENT_PHASES_ENABLED:-false}
      # Legacy direct LLM calls now route through MCP. No gateway URL or
      # provider keys in this service.
      LLM_GATEWAY_TIMEOUT_SEC: ${LLM_GATEWAY_TIMEOUT_SEC:-300}
      # M73-followup — Blueprint Workbench snapshots a GitHub repo before
      # launching a session. Without GITHUB_TOKEN every container shares
      # the 60-req/hr unauth bucket, so the second user trips a 403 or
      # gets clipped by a transient GitHub 5xx. Set GITHUB_TOKEN=<pat>
      # in .env (a fine-grained public-read token is enough — the
      # snapshot path only does GETs).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      # Bind mounts for hot-reload via ts-node-dev. Edits to src/ or the
      # workspace packages take effect immediately without a rebuild.
      - ./workgraph-studio/apps/api/src:/app/apps/api/src
      - ./workgraph-studio/apps/api/prisma:/app/apps/api/prisma
      - ./workgraph-studio/packages:/app/packages
      - ${HOST_DOWNLOADS_DIR:-./.singularity/downloads}:/workspace/downloads:ro
    ports:
      - "8080:8080"
    depends_on:
      wg-postgres:
        condition: service_healthy
      wg-postgres-bootstrap:
        condition: service_completed_successfully
      llm-gateway:
        condition: service_healthy
        required: false
      formal-verifier:
        condition: service_started
        required: false
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # M35.3 — resource limits (workgraph-api carries heavier load: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  workgraph-web:
    build:
      context: ./workgraph-studio
      dockerfile: apps/web/Dockerfile
      # M100 P1 — served under /workflow/ by the edge gateway.
      args:
        BASE_PATH: /workflow/
    container_name: singularity-workgraph-web
    # M65 Slice 2A — compose profiles.
    profiles: [frontend-legacy]
    ports:
      - "5174:80"
    # Debug-only static UI. Start the core stack separately when live API data
    # is needed; avoiding depends_on keeps the legacy profile isolated.
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  blueprint-workbench:
    build:
      context: ./workgraph-studio
      dockerfile: apps/blueprint-workbench/Dockerfile
      # M100 P1 — served under /workbench/ by the edge gateway. AUDIT_GOV_TOKEN
      # stays the M100 P0 server-side-injection build arg.
      args:
        BASE_PATH: /workbench/
    container_name: singularity-blueprint-workbench
    # M65 Slice 2A — compose profiles.
    profiles: [frontend-legacy]
    ports:
      - "5176:80"
    # Debug-only static UI. Start the core stack separately when live API data
    # is needed; avoiding depends_on keeps the legacy profile isolated.
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─────────────────────────────────────────────────────────────────────
  # User and Capability admin SPA
  # ─────────────────────────────────────────────────────────────────────
  user-and-capability:
    build:
      context: ./UserAndCapabillity
      dockerfile: Dockerfile
      # M100 P1 — served under /iam/ by the edge gateway.
      args:
        BASE_PATH: /iam/
    container_name: singularity-user-and-capability
    # M65 Slice 2A — compose profiles.
    profiles: [frontend-legacy]
    ports:
      - "5175:80"
    # Debug-only static UI. Start the core stack separately when live API data
    # is needed; avoiding depends_on keeps the legacy profile isolated.
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─────────────────────────────────────────────────────────────────────
  # Tool Runtime (reference / demo) — MCP-compatible; the service key is
  # `mcp-server` and its client env vars are MCP_* because it speaks the
  # Model Context Protocol. The app itself is the per-tenant tool runtime.
  #
  # In production each customer runs their own copy of this in their VPC.
  # Here we ship one as a demo/test target so the platform stack can be
  # exercised end-to-end without external infra. Provider/tool secrets
  # would normally live in the customer's env; the MCP_BEARER_TOKEN here
  # is the secret context-fabric uses to authenticate to this server.
  # ─────────────────────────────────────────────────────────────────────
  mcp-sandbox-runner:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      target: sandbox-runner
    container_name: singularity-mcp-sandbox-runner
    # M65 Slice 2A — compose profiles.
    profiles: [full, mcp]
    environment:
      NODE_ENV: production
      PORT: 7110
      MCP_RUNNER_TOKEN: ${MCP_RUNNER_TOKEN:-dev-mcp-runner-token-min-16-chars}
      # Must be an absolute host path because the runner asks the host
      # Docker daemon to mount this path into ephemeral command containers.
      MCP_RUNNER_HOST_WORKSPACE_PATH: ${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}
      MCP_RUNNER_WORKSPACE_CONTAINER_PATH: /workspace
      MCP_RUNNER_DEFAULT_IMAGE: ${MCP_RUNNER_DEFAULT_IMAGE:-node:20-alpine}
      MCP_RUNNER_IMAGE_MAP_JSON: '${MCP_RUNNER_IMAGE_MAP_JSON:-{"python":"python:3.12-slim","python3":"python:3.12-slim","pytest":"python:3.12-slim","go":"golang:1.23-alpine","cargo":"rust:1.83-alpine","mvn":"maven:3.9-eclipse-temurin-21","gradle":"gradle:8-jdk21","gradlew":"gradle:8-jdk21","dotnet":"mcr.microsoft.com/dotnet/sdk:8.0"}}'
      # Default 'bridge' (not 'none') so verification tools that need to fetch
      # dependencies on first run can reach their public registries:
      #   - mvn → Maven Central
      #   - gradle → Gradle plugin portal + Maven Central
      #   - pnpm/npm → npm registry
      #   - pip → PyPI
      # Without network access, every fresh build fails at "could not resolve
      # dependencies" and the verification step never produces a useful
      # receipt. To re-tighten in production, set MCP_RUNNER_NETWORK_MODE=none
      # in .env and pre-populate the cache directories with a custom image.
      MCP_RUNNER_NETWORK_MODE: ${MCP_RUNNER_NETWORK_MODE:-bridge}
      MCP_RUNNER_CPU_LIMIT: ${MCP_RUNNER_CPU_LIMIT:-1}
      MCP_RUNNER_MEMORY_LIMIT: ${MCP_RUNNER_MEMORY_LIMIT:-1g}
      MCP_RUNNER_PIDS_LIMIT: ${MCP_RUNNER_PIDS_LIMIT:-256}
      # 2026-05-26 — persistent build-tool cache. When set, the runner
      # bind-mounts this host path as /root inside the sandbox so mvn /
      # gradle / pip / cargo / npm caches persist across tool invocations.
      # Default: ./mcp-server/.docker-sandbox/.singularity/build-cache
      # so local dev gets the speedup automatically; set to empty string
      # to revert to the per-invocation tmpfs. See docker-exec.ts.
      MCP_RUNNER_HOST_BUILD_CACHE_PATH: ${MCP_RUNNER_HOST_BUILD_CACHE_PATH-${PWD}/mcp-server/.docker-sandbox/.singularity/build-cache}
    ports:
      - "127.0.0.1:7110:7110"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}:${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}:rw
      # Mount the host cache dir so the runner can see the path the
      # spawned sandbox container will bind. The path matches what's
      # passed to docker run -v inside docker-exec.ts.
      - ${MCP_RUNNER_HOST_BUILD_CACHE_PATH-${PWD}/mcp-server/.docker-sandbox/.singularity/build-cache}:${MCP_RUNNER_HOST_BUILD_CACHE_PATH-${PWD}/mcp-server/.docker-sandbox/.singularity/build-cache}:rw
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:7110/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    # M35.3 — resource limits (command runner: 1G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      target: dev
    container_name: singularity-mcp-server
    # M65 Slice 2A — compose profiles.
    # MCP is runtime infrastructure, not a web-app backend. Run it locally
    # with `--profile mcp` or point MCP_* URLs at a remote/customer runtime.
    profiles: [full, mcp]
    # M101 — service-local git config. mcp-server follows its OWN
    # mcp-server/.env (env_file below) for git push/auth/token settings, so
    # each deployment is self-contained: edit mcp-server/.env on that host and
    # recreate this service — no root-.env ${...} interpolation to keep in sync.
    # `required: false` → a host without the file still boots (git push stays
    # OFF until configured — fail-safe).
    #
    # M33 still holds: provider keys are NOT here. mcp-server reads zero
    # provider credentials; every LLM call routes through llm-gateway. Keep
    # provider secrets OUT of mcp-server/.env.
    #
    # Precedence note: docker-compose `environment:` OVERRIDES `env_file`, so
    # the git vars below were removed from `environment:` — otherwise their
    # ${...:-default} values would mask whatever mcp-server/.env sets.
    env_file:
      - path: ./mcp-server/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 7100
      LOG_LEVEL: info
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}}
      # ── ToolInvocationGrant verification (defence-in-depth) ─────────────
      # Verify CF-signed grants before running mutating / high-risk tools.
      #   off (default) — grants ignored; pre-hardening behaviour.
      #   grace         — present grants must be valid; a MISSING grant is
      #                   allowed + logged (rollout window).
      #   enforce       — mutating/high-risk tools REQUIRE a valid grant.
      # TOOL_GRANT_SIGNING_SECRET MUST equal context_api_service's value.
      MCP_DEFAULT_GOVERNANCE_MODE: ${MCP_DEFAULT_GOVERNANCE_MODE:-fail_open}
      MCP_TOOL_GRANT_MODE: ${MCP_TOOL_GRANT_MODE:-off}
      MCP_REQUIRE_EFFECTIVE_CAPABILITIES: ${MCP_REQUIRE_EFFECTIVE_CAPABILITIES:-false}
      TOOL_GRANT_SIGNING_SECRET: ${TOOL_GRANT_SIGNING_SECRET:-dev-tool-grant-signing-secret-min-32-chars!!}
      MCP_TOOL_GRANT_REQUIRED_CATEGORIES: ${MCP_TOOL_GRANT_REQUIRED_CATEGORIES:-mutate,finalize,run}
      MCP_TOOL_GRANT_CLOCK_SKEW_SEC: ${MCP_TOOL_GRANT_CLOCK_SKEW_SEC:-30}
      # M28 boot-1 — explicit container-internal paths so /healthz/strict
      # invariants pass. Bound to a writable git repo via the volume mount
      # below. Override MCP_SANDBOX_HOST_PATH to point at a real working
      # checkout when you want the AST/branch tools to operate on real code.
      MCP_SANDBOX_ROOT: /workspace
      MCP_WORKITEM_WORKSPACES_ROOT: ${MCP_WORKITEM_WORKSPACES_ROOT:-/workspace/.singularity/workitems}
      MCP_AST_DB_PATH:  ${MCP_CONTAINER_AST_DB_PATH:-}
      MCP_COMMAND_EXECUTION_MODE: ${MCP_COMMAND_EXECUTION_MODE:-container}
      MCP_RUNNER_URL: http://mcp-sandbox-runner:7110
      MCP_RUNNER_TOKEN: ${MCP_RUNNER_TOKEN:-dev-mcp-runner-token-min-16-chars}
      MCP_RUNNER_HOST_WORKSPACE_PATH: ${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}
      MCP_RUNNER_DEFAULT_IMAGE: ${MCP_RUNNER_DEFAULT_IMAGE:-node:20-alpine}
      MCP_RUNNER_IMAGE_MAP_JSON: '${MCP_RUNNER_IMAGE_MAP_JSON:-{"python":"python:3.12-slim","python3":"python:3.12-slim","pytest":"python:3.12-slim","go":"golang:1.23-alpine","cargo":"rust:1.83-alpine","mvn":"maven:3.9-eclipse-temurin-21","gradle":"gradle:8-jdk21","gradlew":"gradle:8-jdk21","dotnet":"mcr.microsoft.com/dotnet/sdk:8.0"}}'
      # Default 'bridge' (not 'none') so verification tools that need to fetch
      # dependencies on first run can reach their public registries:
      #   - mvn → Maven Central
      #   - gradle → Gradle plugin portal + Maven Central
      #   - pnpm/npm → npm registry
      #   - pip → PyPI
      # Without network access, every fresh build fails at "could not resolve
      # dependencies" and the verification step never produces a useful
      # receipt. To re-tighten in production, set MCP_RUNNER_NETWORK_MODE=none
      # in .env and pre-populate the cache directories with a custom image.
      MCP_RUNNER_NETWORK_MODE: ${MCP_RUNNER_NETWORK_MODE:-bridge}
      # ── Git push / auth / token config — M101 ────────────────────────────
      # These now come from mcp-server/.env (env_file above), NOT from
      # root-.env ${...} interpolation, so the service follows its own env on
      # every host. Set there:
      #   MCP_GIT_AUTH_MODE (disabled|ssh|token), MCP_GIT_PUSH_ENABLED,
      #   MCP_GIT_TOKEN_ENV, GITHUB_TOKEN (or MCP_GIT_TOKEN),
      #   MCP_WORK_BRANCH_PUSH_ON_FINISH, MCP_WORK_BRANCH_PUSH_REMOTE,
      #   MCP_GIT_PUSH_REMOTE, MCP_GIT_USERNAME, MCP_GIT_SSH_KEY_PATH.
      # Token resolution (git-workspace.ts:340):
      #   process.env[MCP_GIT_TOKEN_ENV] → MCP_GIT_TOKEN → GITHUB_TOKEN → GH_TOKEN.
      # The redacted boot log ("[mcp-server] git-auth ...") prints which of
      # these actually resolved at startup so you can confirm per host.
      # SSH_AUTH_SOCK stays here — container ssh-agent socket (infra, not config).
      SSH_AUTH_SOCK: ${MCP_GIT_SSH_AUTH_SOCK:-/ssh-agent}
      # ── M33 — Central LLM Gateway ────────────────────────────────────────
      # MCP no longer holds provider keys. Every LLM call routes through the
      # llm-gateway service. No provider fallback chain; gateway errors
      # propagate. The only allowed fallback is the gateway's `mock` provider.
      LLM_GATEWAY_URL:        ${LLM_GATEWAY_INTERNAL_URL:-http://llm-gateway:8001}
      LLM_GATEWAY_BEARER:     ${LLM_GATEWAY_BEARER:-}
      LLM_GATEWAY_TIMEOUT_SEC: ${LLM_GATEWAY_TIMEOUT_SEC:-300}
      # ── M60 Slice 1 — Formal verification gate (Z3). Disabled by default.
      # Flip FORMAL_VERIFICATION_ENABLED=true in .env to make finish_work_branch
      # call the verifier. URL must use the compose-internal hostname so the
      # localhost default in mcp-server/config.ts doesn't escape the container.
      FORMAL_VERIFICATION_ENABLED:        ${FORMAL_VERIFICATION_ENABLED:-false}
      FORMAL_VERIFIER_URL:                ${FORMAL_VERIFIER_INTERNAL_URL:-http://formal-verifier:8010}
      FORMAL_VERIFICATION_TIMEOUT_MS:     ${FORMAL_VERIFICATION_DEFAULT_TIMEOUT_MS:-3000}
      FORMAL_VERIFICATION_BLOCK_ON_UNKNOWN: ${FORMAL_VERIFICATION_BLOCK_ON_UNKNOWN:-true}
      # ── M61 Wire E + Wire B P2 — best-effort CapabilityWorldModel
      # callbacks from /mcp/code-context/build. Hardcoded compose-internal
      # hostname for the same reason as FORMAL_VERIFIER_URL above.
      AGENT_RUNTIME_URL:                  http://agent-runtime:3003
      # External catalog (display-only after M33 — the gateway is authoritative).
      MCP_ALLOWED_LLM_PROVIDERS: ${MCP_ALLOWED_LLM_PROVIDERS:-}
      MCP_LLM_PROVIDER_CONFIG_PATH: ${MCP_LLM_PROVIDER_CONFIG_CONTAINER_PATH:-/app/.singularity/llm-providers.json}
      MCP_LLM_MODEL_CATALOG_PATH:  ${MCP_LLM_MODEL_CATALOG_CONTAINER_PATH:-/app/.singularity/llm-models.json}
      MAX_AGENT_STEPS: 12
      # M64 — Overall agent-loop budget. Bumped 240 → 300 so a single
      # LLM call with the gateway mid-retry of a 529 has time to
      # complete before MCP gives up on its own loop. Must stay ≥
      # LLM_GATEWAY_TIMEOUT_SEC + a few seconds of headroom.
      TIMEOUT_SEC: 300
      # Workspace lock timeout — must exceed the worst-case time for a single
      # stage attempt (developer loop with 12 steps × Sonnet ≈ 60-180s) so a
      # user clicking "re-run" while another attempt is still running doesn't
      # immediately fail with "workspace is locked". Stale-lock GC still runs
      # against MCP_WORKSPACE_LOCK_STALE_MS (default 30 min) to clean up after
      # crashed processes.
      MCP_WORKSPACE_LOCK_TIMEOUT_MS: ${MCP_WORKSPACE_LOCK_TIMEOUT_MS:-300000}
      # Phased Agent Reasoning Model (v4) — opt-in. When true (server) AND
      # the caller sends agentReasoningMode="phased", runLoop switches from
      # the flat ReAct loop to a 6-phase state machine with per-phase tool
      # allowlists and a path-coverage gate. Default false so production
      # behavior is unchanged until the operator flips this.
      MCP_AGENT_PHASES_ENABLED: ${MCP_AGENT_PHASES_ENABLED:-false}
      # M11.a — self-register with platform-registry
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      PUBLIC_BASE_URL:       ${MCP_PUBLIC_BASE_URL:-http://host.docker.internal:7100}
      # M21 — central audit & governance ledger (fire-and-forget POST)
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      CONTEXT_FABRIC_URL: http://context-api:8000
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      PROMPT_COMPOSER_SERVICE_TOKEN: ${PROMPT_COMPOSER_SERVICE_TOKEN:-${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}}
      # M67 Slice 1A — points at agent-service (learning-service was folded in)
      LEARNING_SERVICE_URL: http://agent-service:3001
      LEARNING_SERVICE_TOKEN: ${LEARNING_SERVICE_TOKEN:-${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}}
      # M36.7 — mcp-server fetches the "code-tool-use nudge" SystemPrompt
      # (key=mcp.code-tool-use-nudge) from prompt-composer at run time so
      # there are no inline prompts in mcp-server source. Required when
      # allowAutonomousMutation runs trigger the nudge path. Hardcoded
      # (not ${PROMPT_COMPOSER_URL:-…}) so a host-side env var like
      # "http://localhost:3004" can't leak in and resolve to mcp-server's
      # own loopback inside the container.
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
    ports:
      - "7100:7100"
    depends_on:
      mcp-sandbox-runner:
        condition: service_healthy
      formal-verifier:
        condition: service_started
        required: false
    volumes:
      - ./mcp-server/src:/app/src
      # Generated by `./singularity.sh config mcp-catalog`; mounted read-only
      # so Dockerized MCP can resolve the same model/provider catalog as the
      # host-side bare-metal scripts without copying secrets into git.
      - ./.singularity:/app/.singularity:ro
      # M28 boot-1 — mount the operator's working repo as the sandbox.
      # Defaults to a tmp git-initialized dir created by entrypoint.sh.
      # Override MCP_SANDBOX_HOST_PATH=$HOME/my-repo when you want to
      # iterate on real code.
      - ${MCP_SANDBOX_HOST_PATH:-./mcp-server/.docker-sandbox}:/workspace
      # Optional Git push credentials. The key path is local-only and
      # controlled by `./singularity.sh config git`; /dev/null keeps compose
      # valid when push is disabled or token mode is used.
      - ${MCP_GIT_SSH_KEY_HOST_PATH:-/dev/null}:/run/secrets/singularity_git_ssh_key:ro
      # M73-followup — Don't auto-inherit SSH_AUTH_SOCK from the operator's
      # shell. On macOS the launchd-managed socket path
      # (/var/run/com.apple.launchd.*/Listeners) cannot be bind-mounted into
      # Docker Desktop containers — the daemon refuses with "operation not
      # supported" and the container never leaves "Created" state. That
      # outage cascades: no mcp-server means no DNS entry for it, and
      # every workgraph-api call to /api/llm/* returns 500 with
      # "getaddrinfo ENOTFOUND mcp-server".
      #
      # Use an opt-in variable instead: set
      # SINGULARITY_SSH_AUTH_SOCK_HOST=$SSH_AUTH_SOCK in .env when you
      # actually need ssh-agent forwarding inside the container. Default
      # (/dev/null) is safe everywhere — git push via PAT still works.
      - ${SINGULARITY_SSH_AUTH_SOCK_HOST:-/dev/null}:/ssh-agent:ro
    # M35.3 — resource limits (MCP demo: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # Legacy Singularity Portal (debug profile only; platform-web is canonical)
  # ─────────────────────────────────────────────────────────────────────
  portal:
    build:
      context: ./singularity-portal
      dockerfile: Dockerfile
    container_name: singularity-portal
    # M65 Slice 2A — compose profiles.
    profiles: [frontend-legacy]
    ports:
      - "5182:80"
    environment:
      # Legacy-only. Keep links pointed at the canonical Platform Web routes
      # so enabling the debug profile does not reintroduce split-app navigation.
      PORTAL_LINK_AGENT_ADMIN: ${PORTAL_LINK_AGENT_ADMIN:-http://localhost:5180/agents}
      PORTAL_LINK_IAM_ADMIN: ${PORTAL_LINK_IAM_ADMIN:-http://localhost:5180/identity}
      PORTAL_LINK_WORKGRAPH_DESIGNER: ${PORTAL_LINK_WORKGRAPH_DESIGNER:-http://localhost:5180/workflows}
      PORTAL_LINK_BLUEPRINT_WORKBENCH: ${PORTAL_LINK_BLUEPRINT_WORKBENCH:-http://localhost:5180/workbench}
      PORTAL_LINK_CODE_FOUNDRY: ${PORTAL_LINK_CODE_FOUNDRY:-http://localhost:5180/foundry}
    # Debug-only wrapper. Start the core stack separately when live API data is
    # needed; avoiding depends_on keeps the legacy profile isolated.
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─────────────────────────────────────────────────────────────────────
  # Legacy edge gateway (debug profile only). The canonical operator origin is
  # platform-web on :5180.
  # ─────────────────────────────────────────────────────────────────────
  edge-gateway:
    build:
      context: ./edge-gateway
      dockerfile: Dockerfile
    container_name: singularity-edge-gateway
    profiles: [frontend-legacy]
    # 8085 — 8090 is reserved for PLATFORM_REGISTRY_URL.
    ports:
      - "8085:80"
    depends_on:
      - portal
      - workgraph-web
      - blueprint-workbench
      - user-and-capability
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  iam_postgres_data:
  at_postgres_data:
  wg_postgres_data:
  wg_minio_data:
  context_api_data:

secrets:
  artifactory_npm_token:
    environment: ARTIFACTORY_NPM_TOKEN
