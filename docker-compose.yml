# Singularity Platform — master docker compose.
#
# Brings up every Singularity service in one stack:
#   - IAM (Postgres :5433 + iam-service :8100)
#   - agent-and-tools (Postgres :5432 + agent-service :3001 + tool-service :3002
#                      + agent-runtime :3003 + prompt-composer :3004 + web :3000)
#   - context-fabric (api :8000 + llm-gateway :8001 + memory :8002)
#     [M65: metrics-ledger sunset — savings analytics moved to audit-gov :8500]
#   - workgraph-studio (Postgres :5434 + MinIO :9000/:9001 + api :8080 + web :5174 + workbench :5176)
#   - UserAndCapabillity (:5175)
#   - singularity-portal (:5180)
#
# Usage:
#   docker compose up -d                   # start everything (default; relies on
#                                          # .env COMPOSE_PROFILES=full)
#   docker compose up -d <service>         # start one
#   docker compose stop <service>          # stop one
#   docker compose down                    # tear everything down (keeps volumes)
#   docker compose down -v                 # tear down + delete data volumes
#
# M65 Slice 2A — Compose profiles. Every service is tagged
# (`profiles: [full, ...]` after `container_name:`). Operators can run
# subsets instead of all-or-nothing:
#   docker compose --profile full          up -d   # all 25 services (default)
#   docker compose --profile gateway-only  up -d   # llm-gateway + at-postgres
#   docker compose --profile composer-only up -d   # prompt-composer + gateway + postgres
# .env's COMPOSE_PROFILES=full keeps plain `docker compose up -d` starting
# everything for backward compatibility.
#
# Or use the wrapper:
#   ./singularity.sh up                    # = docker compose up -d
#   ./singularity.sh up portal             # = docker compose up -d portal
#   ./singularity.sh status                # = docker compose ps
#   ./singularity.sh logs api              # = docker compose logs -f workgraph-api
#
# Port map (host → container):
#   3000 agent-and-tools/web (Next.js admin)
#   3001 agent-service             3002 tool-service           3003 agent-runtime
#   3004 prompt-composer          3005 code-foundry-api      3006 learning-service
#   5174 workgraph-web             5175 UserAndCapabillity     5176 Blueprint Workbench
#   5180 singularity-portal
#   5432 agent-and-tools postgres  5433 IAM postgres           5434 workgraph postgres
#   8000-8003 context-fabric       8080 workgraph-api
#   8100 IAM API                   9000-9001 MinIO

name: singularity

services:
  # ─────────────────────────────────────────────────────────────────────
  # IAM
  # ─────────────────────────────────────────────────────────────────────
  iam-postgres:
    image: postgres:16-alpine
    container_name: singularity-iam-postgres
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      POSTGRES_USER: singularity
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity_iam
    ports:
      - "5433:5432"
    volumes:
      - iam_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U singularity -d singularity_iam"]
      interval: 5s
      timeout: 5s
      retries: 10
    # M35.3 — resource limits (postgres: 4G memory / 2 CPU)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  iam-service:
    build:
      context: ./singularity-iam-service
      dockerfile: Dockerfile
    container_name: singularity-iam-service
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      DATABASE_URL: postgresql+asyncpg://singularity:singularity@iam-postgres:5432/singularity_iam
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      JWT_EXPIRE_MINUTES: 60
      LOCAL_SUPER_ADMIN_EMAIL: ${LOCAL_SUPER_ADMIN_EMAIL:-admin@singularity.local}
      LOCAL_SUPER_ADMIN_PASSWORD: ${LOCAL_SUPER_ADMIN_PASSWORD:-Admin1234!}
      CORS_ORIGINS: '["http://localhost:5175","http://localhost:5180","http://localhost:3000","http://localhost:5174","http://localhost:5176"]'
    ports:
      - "8100:8100"
    depends_on:
      iam-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8100/api/v1/health', timeout=2).status==200 else sys.exit(1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    # M35.3 — resource limits (IAM service: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # agent-and-tools
  # ─────────────────────────────────────────────────────────────────────
  at-postgres:
    image: pgvector/pgvector:pg16
    container_name: singularity-at-postgres
    # M65 Slice 2A — compose profiles.
    profiles: [full, gateway-only, composer-only]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity
    ports:
      - "5432:5432"
    volumes:
      - at_postgres_data:/var/lib/postgresql/data
      - ./agent-and-tools/packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # M35.3 — resource limits (postgres: 4G memory / 2 CPU)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  agent-service:
    build:
      context: ./agent-and-tools
      dockerfile: apps/agent-service/Dockerfile
    container_name: singularity-agent-service
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3001
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity
      IAM_SERVICE_URL: http://iam-service:8100
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5180}
    ports:
      - "3001:3001"
    depends_on:
      at-postgres:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/agent-service/src:/app/apps/agent-service/src
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  tool-service:
    build:
      context: ./agent-and-tools
      dockerfile: apps/tool-service/Dockerfile
    container_name: singularity-tool-service
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3002
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity
      IAM_SERVICE_URL: http://iam-service:8100
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5180}
    ports:
      - "3002:3002"
    depends_on:
      at-postgres:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/tool-service/src:/app/apps/tool-service/src
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  agent-runtime:
    build:
      context: ./agent-and-tools
      dockerfile: apps/agent-runtime/Dockerfile
      target: dev
    container_name: singularity-agent-runtime
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3003
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      LOG_LEVEL: info
      # agent-runtime never calls a provider directly. These two
      # vars are informational fallbacks stamped onto AgentExecution rows
      # when no model_alias is supplied; real LLM work goes through MCP.
      AGENT_RUN_FALLBACK_PROVIDER: stub
      AGENT_RUN_FALLBACK_MODEL: stub-model
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      IAM_SERVICE_URL: http://iam-service:8100
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
    ports:
      - "3003:3003"
    depends_on:
      at-postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/agent-runtime/src:/app/apps/agent-runtime/src
      - ./agent-and-tools/apps/agent-runtime/prisma:/app/apps/agent-runtime/prisma
      # NOTE: generated/prisma-client is intentionally NOT bind-mounted.
      # The Prisma engine binaries are platform-specific; the host
      # (macOS) and container (Alpine linux-musl-arm64) need different
      # ones. Operators who edit schema.prisma should re-run
      # `prisma generate` INSIDE the container:
      #   docker exec singularity-agent-runtime npx prisma generate
      # then restart the container so ts-node-dev reloads the new
      # client. The schema itself flows via the prisma/ bind mount.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  prompt-composer:
    build:
      context: ./agent-and-tools
      dockerfile: apps/prompt-composer/Dockerfile
      target: dev
    container_name: singularity-prompt-composer
    # M65 Slice 2A — compose profiles.
    profiles: [full, composer-only]
    environment:
      NODE_ENV: development
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3004
      # M30 — composer owns `singularity_composer` (PromptAssembly etc.) and
      # reads agent-runtime models from `singularity` via runtime-reader.
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity_composer
      DATABASE_URL_RUNTIME_READ: postgresql://postgres:singularity@at-postgres:5432/singularity
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      LOG_LEVEL: info
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      CONTEXT_FABRIC_URL: http://context-api:8000
      LEARNING_SERVICE_URL: http://learning-service:3006
      WORKGRAPH_ARTIFACT_FETCH_URL: http://workgraph-api:8080/api/internal/artifacts/fetch
      WORKGRAPH_ARTIFACT_FETCH_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      # Composer's capsule compiler + model catalog lookups flow through MCP.
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      CAPSULE_COMPILE_MODEL_ALIAS: ${CAPSULE_COMPILE_MODEL_ALIAS:-}
      EMBEDDING_MODEL_ALIAS:       ${EMBEDDING_MODEL_ALIAS:-}
    ports:
      - "3004:3004"
    depends_on:
      at-postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/prompt-composer/src:/app/apps/prompt-composer/src
      - ./agent-and-tools/apps/prompt-composer/prisma:/app/apps/prompt-composer/prisma
      # Same caveat as agent-runtime: generated/prisma-client is not
      # bind-mounted because the platform-specific engine binaries
      # would conflict. Re-run prisma generate in-container after
      # schema edits:
      #   docker exec singularity-prompt-composer npx prisma generate
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3004/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # M35.3 — resource limits (app services default: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  learning-service:
    build:
      context: ./agent-and-tools
      dockerfile: apps/learning-service/Dockerfile
      target: dev
    container_name: singularity-learning-service
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      AUTH_OPTIONAL: ${AUTH_OPTIONAL:-true}
      PORT: 3006
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity_learning
      LEARNING_SERVICE_TOKEN: ${LEARNING_SERVICE_TOKEN:-dev-learning-service-token}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
    ports:
      - "3006:3006"
    depends_on:
      at-postgres:
        condition: service_healthy
    volumes:
      - ./agent-and-tools/apps/learning-service/src:/app/apps/learning-service/src
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3006/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # ─────────────────────────────────────────────────────────────────────
  # Singularity Code Foundry — deterministic-first code generation layer.
  # M42.1 ships the spec spine: validator + IR + lifecycle + receipt + CLI.
  # M42.2+ adds template-driven generators, verification, gap detection,
  # constrained LLM patches, brownfield repo scanning, and approval UI.
  # ─────────────────────────────────────────────────────────────────────
  code-foundry-api:
    build:
      context: ./singularity-code-foundry
      dockerfile: apps/code-foundry-api/Dockerfile
      target: dev
    container_name: singularity-code-foundry-api
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      PORT: 3005
      LOG_LEVEL: info
      # Foundry's own DB on the shared at-postgres container.
      DATABASE_URL: postgresql://postgres:singularity@at-postgres:5432/singularity_codegen
      # Master gate + sub-flags live on workgraph-api's feature_flags
      # table (M42.0). Every codegen route checks them.
      WORKGRAPH_API_URL: http://workgraph-api:8080
      # Service token presented as X-Service-Token when reading the
      # feature_flags table via /api/internal/feature-flags. Must match
      # workgraph-api's WORKGRAPH_INTERNAL_TOKEN (defaults to the same
      # dev value).
      WORKGRAPH_INTERNAL_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      CODEGEN_SERVICE_TOKEN: ${CODEGEN_SERVICE_TOKEN:-dev-codegen-service-token}
      # M42.6 — origins allowed by the CORS layer. The SPA on :5181 hits
      # the API on :3005; production should override with the SPA's
      # public URL.
      FOUNDRY_WEB_ORIGIN: ${FOUNDRY_WEB_ORIGIN:-http://localhost:5181}
      GENERATOR_VERSION: code-foundry-0.2.0
      TEMPLATE_VERSION: spec-only-0.1.0
      WORKSPACE_ROOT: /workspace
      FEATURE_FLAG_TTL_MS: 30000
    ports:
      - "3005:3005"
    volumes:
      # Hot-reload sources for the dev target.
      - ./singularity-code-foundry/apps/code-foundry-api/src:/app/apps/code-foundry-api/src
      - ./singularity-code-foundry/apps/code-foundry-api/examples:/app/apps/code-foundry-api/examples
      # M42.2 — host-visible workspace for generated projects (per-run dirs).
      # Override CODE_FOUNDRY_WORKSPACE_HOST to point at a real working
      # checkout when you want to mvn-build the generated output.
      - ${CODE_FOUNDRY_WORKSPACE_HOST:-./singularity-code-foundry/.workspace}:/workspace
    depends_on:
      at-postgres:
        condition: service_healthy
      workgraph-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M42.6 — Code Foundry approval UI. Vite + React dev server on :5181.
  # Talks to code-foundry-api via /api/* (Vite dev proxy). Production
  # builds would serve the static `dist/` behind the API host directly.
  # ─────────────────────────────────────────────────────────────────────
  code-foundry-web:
    build:
      context: ./singularity-code-foundry
      dockerfile: apps/code-foundry-web/Dockerfile
    container_name: singularity-code-foundry-web
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      VITE_FOUNDRY_API_URL: http://code-foundry-api:3005
      # When the operator sets CODEGEN_SERVICE_TOKEN to a non-default
      # value, propagate it to the SPA build so fetch() can send it.
      VITE_FOUNDRY_TOKEN: ${CODEGEN_SERVICE_TOKEN:-dev-codegen-service-token}
    ports:
      - "5181:5181"
    volumes:
      - ./singularity-code-foundry/apps/code-foundry-web/src:/app/apps/code-foundry-web/src
      - ./singularity-code-foundry/apps/code-foundry-web/index.html:/app/apps/code-foundry-web/index.html
      - ./singularity-code-foundry/apps/code-foundry-web/public:/app/apps/code-foundry-web/public
    depends_on:
      code-foundry-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  agent-web:
    build:
      context: ./agent-and-tools/web
      dockerfile: Dockerfile
    container_name: singularity-agent-web
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NEXT_PUBLIC_AGENT_SERVICE_URL: http://localhost:3001
      NEXT_PUBLIC_TOOL_SERVICE_URL: http://localhost:3002
      NEXT_PUBLIC_AGENT_RUNTIME_URL: http://localhost:3003
      NEXT_PUBLIC_PROMPT_COMPOSER_URL: http://localhost:3004
      AGENT_SERVICE_URL: http://agent-service:3001
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      IAM_BASE_URL: http://iam-service:8100/api/v1
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
    ports:
      - "3000:3000"
    # M35.3 — long-form depends_on with condition: service_healthy
    depends_on:
      agent-service:
        condition: service_healthy
      tool-service:
        condition: service_healthy
      agent-runtime:
        condition: service_healthy
      prompt-composer:
        condition: service_healthy
    # M35.3 — resource limits (frontend SPA: 1G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # context-fabric
  # ─────────────────────────────────────────────────────────────────────


  context-memory:
    build:
      context: ./context-fabric
      dockerfile: services/context_memory_service/Dockerfile
    container_name: singularity-context-memory
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    # context-memory routes its summarizer through MCP, never hits a provider
    # or LLM gateway directly.
    environment:
      CONTEXT_MEMORY_DB: /data/context_memory.db
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      SUMMARIZER_MODEL_ALIAS: ${SUMMARIZER_MODEL_ALIAS:-}
    ports:
      - "8002:8002"
    volumes:
      - ./context-fabric/data/context_memory:/data
    depends_on:
      llm-gateway:
        condition: service_healthy
    # M35.3 — resource limits (memory service: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # M65 Slice 1B — metrics-ledger removed.
  #
  # Token-savings analytics moved to audit-gov (M65 Slice 1A). The
  # SQLite file under context-fabric/data/metrics_ledger/ is left on
  # disk for one operator cycle in case any external scripts read it
  # directly; deletion is a follow-up after no callers are observed.
  # Source code stays in tree at context-fabric/services/metrics_ledger_service/
  # marked deprecated; will be removed in M66.

  context-api:
    build:
      context: ./context-fabric
      dockerfile: services/context_api_service/Dockerfile
    container_name: singularity-context-api
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    # context-api orchestrates but doesn't call providers or the LLM gateway
    # directly. LLM traffic routes through MCP.
    environment:
      CONTEXT_MEMORY_URL: http://context-memory:8002
      # M65 Slice 1B — METRICS_LEDGER_URL removed. /metrics/dashboard and
      # /sessions/{id}/metrics now proxy to audit-gov (AUDIT_GOV_URL below).
      # If a legacy caller still references this env var the proxy fall-back
      # returns 404 — preferred over silently routing to a dead host.
      COMPOSER_URL: http://prompt-composer:3004
      IAM_BASE_URL: http://iam-service:8100/api/v1
      IAM_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      IAM_BOOTSTRAP_USERNAME: ${IAM_BOOTSTRAP_USERNAME:-admin@singularity.local}
      IAM_BOOTSTRAP_PASSWORD: ${IAM_BOOTSTRAP_PASSWORD:-Admin1234!}
      MCP_DEFAULT_BASE_URL: ${MCP_DEFAULT_BASE_URL:-http://mcp-server-demo:7100}
      MCP_DEFAULT_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      MCP_DEFAULT_SERVER_ID: ${MCP_DEFAULT_SERVER_ID:-local-default-mcp}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      # M61 Wire 2 — agent-runtime is the source of truth for the
      # CapabilityWorldModel row. context-api fetches it (GET
      # /capabilities/:id/world-model) at /execute time and forwards
      # it to prompt-composer so the Slice F renderers can emit
      # CODE_AGENT_RULES + CODE_WORLD_MODEL layers.
      #
      # Hardcoded to the compose-internal hostname (not
      # ${AGENT_RUNTIME_URL:-…}) so the host-side .env value
      # `AGENT_RUNTIME_URL=http://localhost:3003` — meant for scripts
      # running outside docker — doesn't leak in and resolve to
      # context-api's own loopback inside the container.
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      # M62 Slice E — Per-layer prompt compression. When
      # COMPRESSION_ENABLED=true, context-api adds a `compression`
      # block to the compose request body so prompt-composer compresses
      # over-budget allowlisted layers via the prompt-compressor sidecar.
      # Default OFF — flip in .env to activate.
      COMPRESSOR_URL: http://prompt-compressor:8011
      COMPRESSION_ENABLED: ${COMPRESSION_ENABLED:-false}
      COMPRESSION_PER_LAYER_BUDGET_TOKENS: ${COMPRESSION_PER_LAYER_BUDGET_TOKENS:-1500}
      # M64 — Wait time on /mcp/invoke before context-fabric aborts.
      # Must exceed mcp-server's TIMEOUT_SEC (300) plus subscriber-drain
      # window (≈1s). 480s = 8 min headroom.
      CONTEXT_FABRIC_MCP_INVOKE_TIMEOUT_SEC: ${CONTEXT_FABRIC_MCP_INVOKE_TIMEOUT_SEC:-480}
      # M65 Slice 1A — audit-gov is the canonical home for token-savings
      # analytics. /metrics/dashboard and /sessions/{id}/metrics proxy
      # here when set; legacy metrics-ledger remains as fallback during
      # the M65 transition.
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
    ports:
      - "8000:8000"
    depends_on:
      iam-service:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
      context-memory:
        condition: service_started
      # M65 Slice 1B — metrics-ledger removed from depends_on.
      mcp-server-demo:
        condition: service_started
    # M35.3 — resource limits (orchestrator: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M60 Slice 1 — Formal Verifier (Z3-backed SMT proofs)
  #
  # Pure verifier: receives a constraint payload + query, returns
  # SAT/UNSAT/UNKNOWN with a hash and (optionally) a counterexample.
  # No provider keys, no outbound HTTP. DATABASE_URL is intentionally
  # left empty so persistence is skipped in dev — flip on later by
  # pointing at a Postgres + running `ensure_schema`.
  #
  # Consumers:
  #   - mcp-server-demo (formal_verify tool + finish_work_branch gate)
  #   - workgraph-api   (Governance Path Analyzer / deployment gate)
  # Both reach it via http://formal-verifier:8010 inside the compose
  # network. FORMAL_VERIFICATION_ENABLED governs whether either consumer
  # actually calls it — the service starts regardless so health is
  # observable from /api/v1/verification/status.
  # ─────────────────────────────────────────────────────────────────────
  formal-verifier:
    build:
      context: ./context-fabric
      dockerfile: services/formal_verifier_service/Dockerfile
    container_name: singularity-formal-verifier
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      LOG_LEVEL: info
      # Pydantic-settings reads these as snake_case fields, but env vars
      # are matched case-insensitively against the field name.
      FORMAL_VERIFICATION_ENABLED: ${FORMAL_VERIFICATION_ENABLED:-false}
      DEFAULT_TIMEOUT_MS: ${FORMAL_VERIFICATION_DEFAULT_TIMEOUT_MS:-3000}
      MAX_TIMEOUT_MS: ${FORMAL_VERIFICATION_MAX_TIMEOUT_MS:-10000}
      # Leave empty to disable persistence (dev default). To enable, point
      # at a Postgres URL — schema is created on first call.
      DATABASE_URL: ${FORMAL_VERIFIER_DATABASE_URL:-}
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8010/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M62 — Prompt Compressor (LLMLingua-2 sidecar)
  #
  # Local prompt compression for verbose ambient layers (CLAUDE.md,
  # RUNTIME_EVIDENCE) before they hit the LLM. ZERO runtime network:
  # the llmlingua-2 BERT base model (~180MB) is baked into the image
  # at build time, and the container runs with TRANSFORMERS_OFFLINE=1
  # so a stale model name can't trigger an outbound HuggingFace fetch.
  # Office / air-gapped friendly.
  #
  # Consumers:
  #   - prompt-composer (M62 Slice D) — opt-in per-layer compression
  #     against an explicit allowlist (CODE_AGENT_RULES, RUNTIME_EVIDENCE
  #     by default). Layers not in the allowlist are never compressed.
  #
  # Reached at http://prompt-compressor:8011 from inside the network.
  # COMPRESSION_ENABLED governs whether the compressor instance loads;
  # the service itself starts regardless so /health is observable.
  # ─────────────────────────────────────────────────────────────────────
  prompt-compressor:
    build:
      context: ./context-fabric
      dockerfile: services/prompt_compressor_service/Dockerfile
    container_name: singularity-prompt-compressor
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      LOG_LEVEL: info
      COMPRESSION_ENABLED: ${COMPRESSION_ENABLED:-true}
      # M62 Slice F — strategy switch. Default "stopwords" is the
      # fast deterministic path with no ML deps; flip to "llmlingua"
      # to use the BERT-based importance model (requires the
      # COMPRESSION_BAKE_MODEL build-arg to be set to a real model id
      # so the weights are present in the image — see Dockerfile).
      COMPRESSION_STRATEGY: ${COMPRESSION_STRATEGY:-stopwords}
      COMPRESSION_MODEL_NAME: ${COMPRESSION_MODEL_NAME:-microsoft/llmlingua-2-bert-base-multilingual-cased-meetingbank}
      COMPRESSION_DEVICE: ${COMPRESSION_DEVICE:-cpu}
      COMPRESSION_LAZY_LOAD: ${COMPRESSION_LAZY_LOAD:-true}
      COMPRESSION_MIN_TARGET_TOKENS: ${COMPRESSION_MIN_TARGET_TOKENS:-20}
      COMPRESSION_MAX_INPUT_CHARS: ${COMPRESSION_MAX_INPUT_CHARS:-200000}
    ports:
      - "8011:8011"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8011/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          # 2G covers BERT base (~600MB resident) + tokenizer state +
          # request buffers with headroom. Bump to 3G if switching to
          # llmlingua-2 BERT large.
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # M33 — LLM Gateway (the ONLY service that holds provider keys)
  # ─────────────────────────────────────────────────────────────────────
  llm-gateway:
    build:
      context: ./context-fabric
      dockerfile: services/llm_gateway_service/Dockerfile
    container_name: singularity-llm-gateway
    # M65 Slice 2A — compose profiles.
    profiles: [full, gateway-only, composer-only]
    # M53 — Provider credentials are read from .env.llm-secrets via env_file
    # (NOT via ${...} shell substitution), so an empty `ANTHROPIC_API_KEY` in
    # the operator's shell can never shadow the real value during a
    # `docker compose up --force-recreate`. The fix root-causes the recurring
    # "Missing credential" 503s after every gateway recreate. The file is
    # gitignored alongside .env and lives only on operator hosts.
    env_file:
      - .env.llm-secrets
    environment:
      LOG_LEVEL: info
      # External config files declare providers + model aliases. Mounted RO.
      LLM_PROVIDER_CONFIG_PATH: /etc/singularity/llm-providers.json
      LLM_MODEL_CATALOG_PATH:   /etc/singularity/mcp-models.json
      # Optional bearer that every consumer must present. Empty = open in dev.
      LLM_GATEWAY_BEARER: ${LLM_GATEWAY_BEARER:-}
      # When ALLOW_CALLER_PROVIDER_OVERRIDE=false the gateway refuses
      # explicit provider/model overrides and forces model_alias use.
      ALLOW_CALLER_PROVIDER_OVERRIDE: ${LLM_GATEWAY_ALLOW_OVERRIDE:-false}
      UPSTREAM_TIMEOUT_SEC: ${LLM_GATEWAY_TIMEOUT_SEC:-300}
      # M62 hotfix — default bumped from 1 to 2 so Anthropic 529
      # (overloaded_error) and 503 (upstream down) transient blips
      # get absorbed transparently before they surface as
      # MCP_INVOKE_FAILED → "send back to an earlier stage" in the
      # workbench. Operators override via .env for noisier upstreams.
      LLM_GATEWAY_RATE_LIMIT_RETRIES: ${LLM_GATEWAY_RATE_LIMIT_RETRIES:-2}
      LLM_GATEWAY_RATE_LIMIT_RETRY_DELAY_SEC: ${LLM_GATEWAY_RATE_LIMIT_RETRY_DELAY_SEC:-65}
      LLM_GATEWAY_RATE_LIMIT_MAX_SLEEP_SEC: ${LLM_GATEWAY_RATE_LIMIT_MAX_SLEEP_SEC:-75}
      # Provider credentials — passed ONLY to this service. Every other
      # service in the stack is enforced to NOT receive these keys (CI guard
      # in M33.7).
      #
      # M53 — Sourced from .env.llm-secrets via env_file above (NOT shell
      # ${VAR:-} substitution). docker compose's `environment:` block
      # OVERRIDES `env_file:` values, so OPENAI_API_KEY / OPENROUTER_API_KEY /
      # ANTHROPIC_API_KEY / COPILOT_TOKEN are intentionally absent here —
      # do not re-add them. If you need to add a NEW provider key, add it
      # to .env.llm-secrets only.
      ANTHROPIC_VERSION:  ${ANTHROPIC_VERSION:-2023-06-01}
      PUBLIC_BASE_URL:    http://llm-gateway:8001
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
    ports:
      - "8001:8001"
    volumes:
      - ./.singularity:/etc/singularity:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/health', timeout=2).status==200 else sys.exit(1)\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    # M35.3 — resource limits (LLM gateway: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # workgraph-studio
  # ─────────────────────────────────────────────────────────────────────
  wg-postgres:
    image: postgres:16-alpine
    container_name: singularity-wg-postgres
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      POSTGRES_DB: workgraph
      POSTGRES_USER: workgraph
      POSTGRES_PASSWORD: workgraph_secret
    ports:
      - "5434:5432"
    volumes:
      - wg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workgraph"]
      interval: 5s
      timeout: 5s
      retries: 10
    # M35.3 — resource limits (postgres: 4G memory / 2 CPU)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'

  wg-minio:
    image: minio/minio:latest
    container_name: singularity-wg-minio
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: workgraph
      MINIO_ROOT_PASSWORD: workgraph_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - wg_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    # M35.3 — resource limits (object storage: 1G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  workgraph-api:
    build:
      context: ./workgraph-studio
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: singularity-workgraph-api
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://workgraph:workgraph_secret@wg-postgres:5432/workgraph
      JWT_SECRET: ${JWT_SECRET:-changeme_dev_only_min_32_chars_long!!}
      MINIO_ENDPOINT: wg-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: workgraph
      MINIO_SECRET_KEY: workgraph_secret
      MINIO_BUCKET: workgraph-documents
      WORKGRAPH_INTERNAL_TOKEN: ${WORKGRAPH_INTERNAL_TOKEN:-dev-workgraph-internal-token}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5176,http://localhost:5180
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
      AUTH_PROVIDER: iam
      IAM_BASE_URL: http://iam-service:8100/api/v1
      AGENT_SERVICE_URL: http://agent-service:3001
      TOOL_SERVICE_URL: http://tool-service:3002
      AGENT_RUNTIME_URL: http://agent-runtime:3003
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      CONTEXT_FABRIC_URL: http://context-api:8000
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      MCP_SERVER_URL: http://mcp-server-demo:7100
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      MCP_SESSION_JWT_SECRET: ${MCP_SESSION_JWT_SECRET:-dev-mcp-session-secret-min-32-chars!!}
      # M60 Slice 1 — Formal verification gate (Z3). Disabled by default;
      # flip FORMAL_VERIFICATION_ENABLED=true in .env to activate. URL is
      # the compose-internal hostname, not localhost.
      FORMAL_VERIFICATION_ENABLED: ${FORMAL_VERIFICATION_ENABLED:-false}
      FORMAL_VERIFIER_URL: http://formal-verifier:8010
      FORMAL_VERIFICATION_TIMEOUT_MS: ${FORMAL_VERIFICATION_DEFAULT_TIMEOUT_MS:-3000}
      WORKBENCH_DEFAULT_MODEL_ALIAS: ${WORKBENCH_DEFAULT_MODEL_ALIAS:-}
      EVENT_HORIZON_MODEL_ALIAS: ${EVENT_HORIZON_MODEL_ALIAS:-}
      # Phased Agent Reasoning Model (v4) — opt-in. When true, developer
      # stages are launched with agentReasoningMode="phased" so mcp-server
      # runs them under the 6-phase state machine. Read-only stages (PLAN,
      # DESIGN, QA_REVIEW) continue to use the flat loop regardless.
      WORKBENCH_AGENT_PHASES_ENABLED: ${WORKBENCH_AGENT_PHASES_ENABLED:-false}
      # Legacy direct LLM calls now route through MCP. No gateway URL or
      # provider keys in this service.
      LLM_GATEWAY_TIMEOUT_SEC: ${LLM_GATEWAY_TIMEOUT_SEC:-300}
    volumes:
      # Bind mounts for hot-reload via ts-node-dev. Edits to src/ or the
      # workspace packages take effect immediately without a rebuild.
      - ./workgraph-studio/apps/api/src:/app/apps/api/src
      - ./workgraph-studio/apps/api/prisma:/app/apps/api/prisma
      - ./workgraph-studio/packages:/app/packages
      - ${HOST_DOWNLOADS_DIR:-./.singularity/downloads}:/workspace/downloads:ro
    ports:
      - "8080:8080"
    depends_on:
      wg-postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
      formal-verifier:
        condition: service_started
    # M35.3 — healthcheck so dependent services can use condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # M35.3 — resource limits (workgraph-api carries heavier load: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  workgraph-web:
    build:
      context: ./workgraph-studio
      dockerfile: apps/web/Dockerfile
    container_name: singularity-workgraph-web
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    ports:
      - "5174:80"
    # M35.3 — long-form depends_on with condition: service_healthy
    depends_on:
      workgraph-api:
        condition: service_healthy
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  blueprint-workbench:
    build:
      context: ./workgraph-studio
      dockerfile: apps/blueprint-workbench/Dockerfile
    container_name: singularity-blueprint-workbench
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    ports:
      - "5176:80"
    # M35.3 — long-form depends_on with condition: service_healthy
    depends_on:
      workgraph-api:
        condition: service_healthy
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─────────────────────────────────────────────────────────────────────
  # User and Capability admin SPA
  # ─────────────────────────────────────────────────────────────────────
  user-and-capability:
    build:
      context: ./UserAndCapabillity
      dockerfile: Dockerfile
    container_name: singularity-user-and-capability
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    ports:
      - "5175:80"
    depends_on:
      iam-service:
        condition: service_healthy
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ─────────────────────────────────────────────────────────────────────
  # MCP Server (reference / demo)
  #
  # In production each customer runs their own copy of this in their VPC.
  # Here we ship one as a demo/test target so the platform stack can be
  # exercised end-to-end without external infra. Provider/tool secrets
  # would normally live in the customer's env; the MCP_BEARER_TOKEN here
  # is the secret context-fabric uses to authenticate to this server.
  # ─────────────────────────────────────────────────────────────────────
  mcp-sandbox-runner:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      target: sandbox-runner
    container_name: singularity-mcp-sandbox-runner
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    environment:
      NODE_ENV: production
      PORT: 7110
      MCP_RUNNER_TOKEN: ${MCP_RUNNER_TOKEN:-dev-mcp-runner-token-min-16-chars}
      # Must be an absolute host path because the runner asks the host
      # Docker daemon to mount this path into ephemeral command containers.
      MCP_RUNNER_HOST_WORKSPACE_PATH: ${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}
      MCP_RUNNER_WORKSPACE_CONTAINER_PATH: /workspace
      MCP_RUNNER_DEFAULT_IMAGE: ${MCP_RUNNER_DEFAULT_IMAGE:-node:20-alpine}
      MCP_RUNNER_IMAGE_MAP_JSON: '${MCP_RUNNER_IMAGE_MAP_JSON:-{"python":"python:3.12-slim","python3":"python:3.12-slim","pytest":"python:3.12-slim","go":"golang:1.23-alpine","cargo":"rust:1.83-alpine","mvn":"maven:3.9-eclipse-temurin-21","gradle":"gradle:8-jdk21","gradlew":"gradle:8-jdk21","dotnet":"mcr.microsoft.com/dotnet/sdk:8.0"}}'
      # Default 'bridge' (not 'none') so verification tools that need to fetch
      # dependencies on first run can reach their public registries:
      #   - mvn → Maven Central
      #   - gradle → Gradle plugin portal + Maven Central
      #   - pnpm/npm → npm registry
      #   - pip → PyPI
      # Without network access, every fresh build fails at "could not resolve
      # dependencies" and the verification step never produces a useful
      # receipt. To re-tighten in production, set MCP_RUNNER_NETWORK_MODE=none
      # in .env and pre-populate the cache directories with a custom image.
      MCP_RUNNER_NETWORK_MODE: ${MCP_RUNNER_NETWORK_MODE:-bridge}
      MCP_RUNNER_CPU_LIMIT: ${MCP_RUNNER_CPU_LIMIT:-1}
      MCP_RUNNER_MEMORY_LIMIT: ${MCP_RUNNER_MEMORY_LIMIT:-1g}
      MCP_RUNNER_PIDS_LIMIT: ${MCP_RUNNER_PIDS_LIMIT:-256}
    ports:
      - "7110:7110"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}:${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}:rw
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:7110/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    # M35.3 — resource limits (command runner: 1G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  mcp-server-demo:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      target: dev
    container_name: singularity-mcp-server-demo
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    # M33 — env_file removed. Provider keys must only be passed to the
    # llm-gateway service. mcp-server reads zero provider credentials.
    environment:
      NODE_ENV: development
      PORT: 7100
      LOG_LEVEL: info
      MCP_BEARER_TOKEN: ${MCP_DEMO_BEARER_TOKEN:-demo-bearer-token-must-be-min-16-chars}
      # M28 boot-1 — explicit container-internal paths so /healthz/strict
      # invariants pass. Bound to a writable git repo via the volume mount
      # below. Override MCP_SANDBOX_HOST_PATH to point at a real working
      # checkout when you want the AST/branch tools to operate on real code.
      MCP_SANDBOX_ROOT: /workspace
      MCP_WORKITEM_WORKSPACES_ROOT: ${MCP_WORKITEM_WORKSPACES_ROOT:-/workspace/.singularity/workitems}
      MCP_AST_DB_PATH:  ${MCP_CONTAINER_AST_DB_PATH:-}
      MCP_COMMAND_EXECUTION_MODE: ${MCP_COMMAND_EXECUTION_MODE:-container}
      MCP_RUNNER_URL: http://mcp-sandbox-runner:7110
      MCP_RUNNER_TOKEN: ${MCP_RUNNER_TOKEN:-dev-mcp-runner-token-min-16-chars}
      MCP_RUNNER_HOST_WORKSPACE_PATH: ${MCP_RUNNER_HOST_WORKSPACE_PATH:-${MCP_SANDBOX_HOST_PATH:-${PWD}/mcp-server/.docker-sandbox}}
      MCP_RUNNER_DEFAULT_IMAGE: ${MCP_RUNNER_DEFAULT_IMAGE:-node:20-alpine}
      MCP_RUNNER_IMAGE_MAP_JSON: '${MCP_RUNNER_IMAGE_MAP_JSON:-{"python":"python:3.12-slim","python3":"python:3.12-slim","pytest":"python:3.12-slim","go":"golang:1.23-alpine","cargo":"rust:1.83-alpine","mvn":"maven:3.9-eclipse-temurin-21","gradle":"gradle:8-jdk21","gradlew":"gradle:8-jdk21","dotnet":"mcr.microsoft.com/dotnet/sdk:8.0"}}'
      # Default 'bridge' (not 'none') so verification tools that need to fetch
      # dependencies on first run can reach their public registries:
      #   - mvn → Maven Central
      #   - gradle → Gradle plugin portal + Maven Central
      #   - pnpm/npm → npm registry
      #   - pip → PyPI
      # Without network access, every fresh build fails at "could not resolve
      # dependencies" and the verification step never produces a useful
      # receipt. To re-tighten in production, set MCP_RUNNER_NETWORK_MODE=none
      # in .env and pre-populate the cache directories with a custom image.
      MCP_RUNNER_NETWORK_MODE: ${MCP_RUNNER_NETWORK_MODE:-bridge}
      MCP_WORK_BRANCH_PUSH_ON_FINISH: ${MCP_WORK_BRANCH_PUSH_ON_FINISH:-false}
      MCP_WORK_BRANCH_PUSH_REMOTE: ${MCP_GIT_PUSH_REMOTE:-origin}
      MCP_GIT_PUSH_ENABLED: ${MCP_GIT_PUSH_ENABLED:-false}
      MCP_GIT_AUTH_MODE: ${MCP_GIT_AUTH_MODE:-disabled}
      MCP_GIT_PUSH_REMOTE: ${MCP_GIT_PUSH_REMOTE:-origin}
      MCP_GIT_TOKEN_ENV: ${MCP_GIT_TOKEN_ENV:-GITHUB_TOKEN}
      MCP_GIT_TOKEN: ${MCP_GIT_TOKEN:-}
      MCP_GIT_USERNAME: ${MCP_GIT_USERNAME:-x-access-token}
      MCP_GIT_SSH_KEY_PATH: ${MCP_GIT_SSH_KEY_PATH:-}
      SSH_AUTH_SOCK: ${MCP_GIT_SSH_AUTH_SOCK:-/ssh-agent}
      # ── M33 — Central LLM Gateway ────────────────────────────────────────
      # MCP no longer holds provider keys. Every LLM call routes through the
      # llm-gateway service. No provider fallback chain; gateway errors
      # propagate. The only allowed fallback is the gateway's `mock` provider.
      LLM_GATEWAY_URL:        http://llm-gateway:8001
      LLM_GATEWAY_BEARER:     ${LLM_GATEWAY_BEARER:-}
      LLM_GATEWAY_TIMEOUT_SEC: ${LLM_GATEWAY_TIMEOUT_SEC:-300}
      # ── M60 Slice 1 — Formal verification gate (Z3). Disabled by default.
      # Flip FORMAL_VERIFICATION_ENABLED=true in .env to make finish_work_branch
      # call the verifier. URL must use the compose-internal hostname so the
      # localhost default in mcp-server/config.ts doesn't escape the container.
      FORMAL_VERIFICATION_ENABLED:        ${FORMAL_VERIFICATION_ENABLED:-false}
      FORMAL_VERIFIER_URL:                http://formal-verifier:8010
      FORMAL_VERIFICATION_TIMEOUT_MS:     ${FORMAL_VERIFICATION_DEFAULT_TIMEOUT_MS:-3000}
      FORMAL_VERIFICATION_BLOCK_ON_UNKNOWN: ${FORMAL_VERIFICATION_BLOCK_ON_UNKNOWN:-true}
      # ── M61 Wire E + Wire B P2 — best-effort CapabilityWorldModel
      # callbacks from /mcp/code-context/build. Hardcoded compose-internal
      # hostname for the same reason as FORMAL_VERIFIER_URL above.
      AGENT_RUNTIME_URL:                  http://agent-runtime:3003
      # External catalog (display-only after M33 — the gateway is authoritative).
      MCP_ALLOWED_LLM_PROVIDERS: ${MCP_ALLOWED_LLM_PROVIDERS:-}
      MCP_LLM_PROVIDER_CONFIG_PATH: ${MCP_LLM_PROVIDER_CONFIG_CONTAINER_PATH:-/app/.singularity/llm-providers.json}
      MCP_LLM_MODEL_CATALOG_PATH:  ${MCP_LLM_MODEL_CATALOG_CONTAINER_PATH:-/app/.singularity/mcp-models.json}
      MAX_AGENT_STEPS: 12
      # M64 — Overall agent-loop budget. Bumped 240 → 300 so a single
      # LLM call with the gateway mid-retry of a 529 has time to
      # complete before MCP gives up on its own loop. Must stay ≥
      # LLM_GATEWAY_TIMEOUT_SEC + a few seconds of headroom.
      TIMEOUT_SEC: 300
      # Workspace lock timeout — must exceed the worst-case time for a single
      # stage attempt (developer loop with 12 steps × Sonnet ≈ 60-180s) so a
      # user clicking "re-run" while another attempt is still running doesn't
      # immediately fail with "workspace is locked". Stale-lock GC still runs
      # against MCP_WORKSPACE_LOCK_STALE_MS (default 30 min) to clean up after
      # crashed processes.
      MCP_WORKSPACE_LOCK_TIMEOUT_MS: ${MCP_WORKSPACE_LOCK_TIMEOUT_MS:-300000}
      # Phased Agent Reasoning Model (v4) — opt-in. When true (server) AND
      # the caller sends agentReasoningMode="phased", runLoop switches from
      # the flat ReAct loop to a 6-phase state machine with per-phase tool
      # allowlists and a path-coverage gate. Default false so production
      # behavior is unchanged until the operator flips this.
      MCP_AGENT_PHASES_ENABLED: ${MCP_AGENT_PHASES_ENABLED:-false}
      # M11.a — self-register with platform-registry
      PLATFORM_REGISTRY_URL: ${PLATFORM_REGISTRY_URL:-http://host.docker.internal:8090}
      PUBLIC_BASE_URL:       ${MCP_PUBLIC_BASE_URL:-http://host.docker.internal:7100}
      # M21 — central audit & governance ledger (fire-and-forget POST)
      AUDIT_GOV_URL: ${AUDIT_GOV_URL:-http://host.docker.internal:8500}
      AUDIT_GOV_SERVICE_TOKEN: ${AUDIT_GOV_SERVICE_TOKEN:-dev-audit-gov-service-token}
      CONTEXT_FABRIC_URL: http://context-api:8000
      CONTEXT_FABRIC_SERVICE_TOKEN: ${CONTEXT_FABRIC_SERVICE_TOKEN:-dev-context-fabric-service-token}
      LEARNING_SERVICE_URL: http://learning-service:3006
      # M36.7 — mcp-server fetches the "code-tool-use nudge" SystemPrompt
      # (key=mcp.code-tool-use-nudge) from prompt-composer at run time so
      # there are no inline prompts in mcp-server source. Required when
      # allowAutonomousMutation runs trigger the nudge path. Hardcoded
      # (not ${PROMPT_COMPOSER_URL:-…}) so a host-side env var like
      # "http://localhost:3004" can't leak in and resolve to mcp-server's
      # own loopback inside the container.
      PROMPT_COMPOSER_URL: http://prompt-composer:3004
    ports:
      - "7100:7100"
    depends_on:
      mcp-sandbox-runner:
        condition: service_healthy
      formal-verifier:
        condition: service_started
    volumes:
      - ./mcp-server/src:/app/src
      # Generated by `./singularity.sh config mcp-catalog`; mounted read-only
      # so Dockerized MCP can resolve the same model/provider catalog as the
      # host-side bare-metal scripts without copying secrets into git.
      - ./.singularity:/app/.singularity:ro
      # M28 boot-1 — mount the operator's working repo as the sandbox.
      # Defaults to a tmp git-initialized dir created by entrypoint.sh.
      # Override MCP_SANDBOX_HOST_PATH=$HOME/my-repo when you want to
      # iterate on real code.
      - ${MCP_SANDBOX_HOST_PATH:-./mcp-server/.docker-sandbox}:/workspace
      # Optional Git push credentials. The key path is local-only and
      # controlled by `./singularity.sh config git`; /dev/null keeps compose
      # valid when push is disabled or token mode is used.
      - ${MCP_GIT_SSH_KEY_HOST_PATH:-/dev/null}:/run/secrets/singularity_git_ssh_key:ro
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent:ro
    # M35.3 — resource limits (MCP demo: 2G memory / 1 CPU)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  # ─────────────────────────────────────────────────────────────────────
  # Singularity Portal (the wrapper SPA)
  # ─────────────────────────────────────────────────────────────────────
  portal:
    build:
      context: ./singularity-portal
      dockerfile: Dockerfile
    container_name: singularity-portal
    # M65 Slice 2A — compose profiles.
    profiles: [full]
    ports:
      - "5180:80"
    # M35.3 — long-form depends_on with condition: service_healthy.
    # context-api uses service_started because it has no formal healthcheck;
    # the others use service_healthy.
    depends_on:
      iam-service:
        condition: service_healthy
      workgraph-api:
        condition: service_healthy
      prompt-composer:
        condition: service_healthy
      context-api:
        condition: service_started
    # M35.3 — resource limits (frontend SPA: 512M memory / 0.5 CPU)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

volumes:
  iam_postgres_data:
  at_postgres_data:
  wg_postgres_data:
  wg_minio_data:
